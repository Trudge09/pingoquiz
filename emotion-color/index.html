<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>당신의 숨겨진 감정 색깔 🎨 내면의 색을 찾아서</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <meta property="og:title" content="당신의 숨겨진 감정 색깔 🎨 내면의 색을 찾아서"/>
  <meta property="og:url" content="https://pingoquiz.netlify.app/emotion-color"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2274221145664784" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0f0f15;
      --card: #161620;
      --primary: #e8a0ff;
      --secondary: #b8c8ff;
      --text: #f0eeff;
      --muted: #8888aa;
      --border: #2a2840;
      --radius: 22px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:0 0 60px; }
    .back-btn { display:inline-block; margin:20px 20px 0; color:var(--muted); font-size:0.85rem; text-decoration:none; }
    .back-btn:hover { color:var(--primary); }
    .container { max-width:520px; margin:0 auto; padding:0 20px; }
    .intro-screen { text-align:center; padding-top:40px; }
    .hero-emoji { font-size:5rem; display:block; margin-bottom:16px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 { font-family:'Jua',cursive; font-size:1.75rem; color:var(--primary); margin-bottom:10px; line-height:1.3; }
    .intro-desc { color:var(--muted); font-size:0.9rem; line-height:1.7; margin-bottom:32px; }
    .start-btn { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; border:none; border-radius:99px; padding:16px 44px; font-family:'Jua',cursive; font-size:1.05rem; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.15); transition:transform 0.15s; }
    .start-btn:hover { transform:scale(1.04); }
    .quiz-screen { display:none; padding-top:30px; }
    .progress-wrap { height:4px; background:var(--border); border-radius:99px; margin-bottom:24px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:99px; transition:width 0.3s; }
    .q-num { font-size:0.78rem; color:var(--muted); margin-bottom:10px; }
    .q-text { font-family:'Jua',cursive; font-size:1.12rem; color:var(--text); margin-bottom:24px; line-height:1.5; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .opt-btn { background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; text-align:left; color:var(--text); font-size:0.9rem; cursor:pointer; transition:all 0.15s; line-height:1.5; }
    .opt-btn:hover { border-color:var(--primary); background:rgba(128,128,128,0.05); }
    .result-screen { display:none; padding-top:30px; }
    .result-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:32px 24px; }
    .res-emoji { font-size:3.8rem; text-align:center; display:block; margin-bottom:12px; }
    .res-label { font-size:0.72rem; color:var(--primary); letter-spacing:0.15em; text-align:center; margin-bottom:6px; font-weight:700; }
    .res-name { font-family:'Jua',cursive; font-size:1.55rem; color:var(--text); text-align:center; margin-bottom:4px; }
    .res-sub { font-size:0.84rem; color:var(--muted); text-align:center; margin-bottom:16px; }
    .res-tag { display:block; width:fit-content; margin:0 auto 20px; background:rgba(128,128,128,0.1); color:var(--primary); border:1px solid rgba(128,128,128,0.2); border-radius:99px; padding:4px 14px; font-size:0.8rem; }
    .section-title { font-family:'Jua',cursive; font-size:0.92rem; color:var(--secondary); margin:20px 0 8px; }
    .res-desc { font-size:0.87rem; color:var(--muted); line-height:1.8; }
    .trait-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .trait-tag { background:rgba(128,128,128,0.08); color:var(--primary); border:1px solid rgba(128,128,128,0.18); border-radius:99px; padding:4px 12px; font-size:0.78rem; }
    .extra-box { background:rgba(128,128,128,0.05); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:8px; }
    .extra-box p { font-size:0.85rem; color:var(--muted); line-height:1.8; }
    .ad-slot { margin:24px 0; }
    .share-btn { width:100%; background:rgba(128,128,128,0.07); color:var(--primary); border:1.5px solid rgba(128,128,128,0.2); border-radius:99px; padding:14px; font-family:'Jua',cursive; font-size:0.95rem; cursor:pointer; transition:all 0.15s; margin-bottom:10px; }
    .share-btn:hover { background:rgba(128,128,128,0.12); }
    .retry-btn { width:100%; background:transparent; color:var(--muted); border:1.5px solid var(--border); border-radius:99px; padding:12px; font-family:'Jua',cursive; font-size:0.9rem; cursor:pointer; }
    .share-card-wrap { margin:24px 0 0; background:rgba(128,128,128,0.05); border:1.5px solid rgba(128,128,128,0.15); border-radius:20px; padding:28px 24px 20px; text-align:center; }
    .sc-card-label { font-size:0.72rem; color:var(--primary); letter-spacing:0.15em; margin-bottom:12px; font-weight:700; }
    #sc-emoji { font-size:2.8rem; margin-bottom:8px; }
    #sc-title { font-family:'Jua',cursive; font-size:1.3rem; margin-bottom:4px; }
    #sc-sub { font-size:0.82rem; color:var(--muted); margin-bottom:10px; }
    #sc-tag { display:inline-block; padding:4px 14px; border-radius:99px; font-size:0.78rem; color:var(--primary); background:rgba(128,128,128,0.08); border:1px solid rgba(128,128,128,0.18); }
    .hint-txt { font-size:0.65rem; color:#aaa; margin-top:10px; }
    .brand-txt { font-size:0.62rem; color:rgba(150,150,150,0.35); letter-spacing:0.1em; margin-top:6px; }
  </style>
</head>
<body>
<a class="back-btn" href="/">← 핑고퀴즈 홈으로</a>
<div class="container">
  <div class="intro-screen" id="intro-screen">
    <span class="hero-emoji">🎨</span>
    <h1>당신의 감정은<br/>어떤 색깔인가요?</h1>
    <p class="intro-desc">선택 하나하나가 당신 내면의 색을 드러내요.<br/>숨겨진 감정의 색을 찾아드릴게요.</p>
    <div class="ad-slot">      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
    <button class="start-btn" onclick="startTest()">🌈 내 감정 색깔 찾기</button>
  </div>
  <div class="quiz-screen" id="quiz-screen">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="q-num" id="q-num">1 / 8</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="result-screen" id="result-screen">
    <div class="result-card">
      <span class="res-emoji" id="res-emoji"></span>
      <div class="res-label" id="res-label"></div>
      <div class="res-name" id="res-name"></div>
      <div class="res-sub" id="res-sub"></div>
      <div class="res-tag" id="res-tag"></div>
      <div class="section-title">💬 분석 결과</div>
      <div class="res-desc" id="res-desc"></div>
      <div class="section-title">✨ 키워드</div>
      <div class="trait-row" id="res-traits"></div>
      <div class="section-title" id="extra-label-el"></div>
      <div class="extra-box"><p id="res-extra"></p></div>
      
    </div>
    <div class="ad-slot">      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>
    <div class="share-card-wrap">
      <div class="sc-card-label">✦ 결과 공유 카드 ✦</div>
      <div id="sc-emoji"></div>
      <div id="sc-title"></div>
      <div id="sc-sub"></div>
      <div id="sc-tag"></div>
      <div class="hint-txt">📱 화면을 캡처해서 친구에게 공유해봐요!</div>
      <div class="brand-txt">pingoquiz</div>
    </div>
    <button class="share-btn" onclick="copyLink(this)">🔗 링크 복사해서 공유하기</button>
    <button class="retry-btn" onclick="restartTest()">🔄 다시 테스트하기</button>
  </div>
</div>
<script>
const results = {
  0: { emoji:"🔴", label:"RED EMOTION", name:"빨강 - 열정과 에너지의 감정", sub:"내면에 뜨거운 불꽃이 타오르고 있어요", tag:"열정 충만 빨강 감정", desc:"당신의 감정은 뜨겁고 강렬해요. 무언가를 원할 때 강하게 원하고, 사랑할 때 깊이 사랑해요. 감정이 선명하게 드러나고, 살아있다는 느낌을 강렬하게 느끼는 타입이에요.", traits:["열정", "강렬함", "추진력", "표현력"], extraLabel:"🎨 감정의 의미", extraText:"빨강 감정을 가진 사람은 삶에 대한 강한 의욕과 에너지가 있어요. 그 열기가 주변을 따뜻하게 만들어요." },
  1: { emoji:"🔵", label:"BLUE EMOTION", name:"파랑 - 고요와 깊이의 감정", sub:"내면에 잔잔하지만 깊은 바다가 있어요", tag:"차분한 깊이 파랑 감정", desc:"당신의 감정은 조용하지만 깊어요. 겉으로는 차분해 보이지만 내면에는 복잡하고 깊은 감정의 층이 있어요. 섬세하게 감정을 느끼고, 오래 기억하는 타입이에요.", traits:["깊이", "섬세함", "고요함", "사색적"], extraLabel:"🎨 감정의 의미", extraText:"파랑 감정을 가진 사람은 깊이 있는 내면을 가지고 있어요. 그 깊이가 당신을 특별하게 만들어요." },
  2: { emoji:"🟡", label:"YELLOW EMOTION", name:"노랑 - 따뜻함과 밝음의 감정", sub:"내면에 햇살 같은 온기가 가득해요", tag:"따뜻한 햇살 노랑 감정", desc:"당신의 감정은 따뜻하고 밝아요. 작은 것에 감사하고, 주변을 밝게 하는 에너지가 있어요. 감정이 소박하고 진실해서 함께 있으면 편안해지는 타입이에요.", traits:["따뜻함", "긍정적", "소박한 행복", "밝은 에너지"], extraLabel:"🎨 감정의 의미", extraText:"노랑 감정을 가진 사람은 일상의 소소한 행복을 발견하는 능력이 있어요. 그 따뜻함이 주변을 치유해요." },
  3: { emoji:"🟣", label:"PURPLE EMOTION", name:"보라 - 신비와 깊이의 감정", sub:"내면에 알 수 없는 우주가 펼쳐져 있어요", tag:"신비로운 깊이 보라 감정", desc:"당신의 감정은 신비롭고 복잡해요. 단순하게 설명할 수 없는 감정들이 뒤섞여 있고, 때로는 본인도 이해하기 어려운 감정을 경험해요. 예술적 감수성과 깊은 내면 세계를 가지고 있어요.", traits:["신비로움", "복잡한 감정", "예술적", "깊은 내면"], extraLabel:"🎨 감정의 의미", extraText:"보라 감정을 가진 사람은 남들이 보지 못하는 것을 느끼는 특별한 감수성이 있어요." },
};
const questions = [
  { text:"🌅 오늘 하루를 색으로 표현한다면?", options:[
    {text:"뜨거운 빨강 - 열정적이고 바쁜 하루",axis:0},
    {text:"차가운 파랑 - 고요하고 조용한 하루",axis:1},
    {text:"따뜻한 노랑 - 소소하게 행복한 하루",axis:2},
    {text:"깊은 보라 - 생각이 많고 복잡한 하루",axis:3},
  ]},
  { text:"🎵 혼자 있을 때 주로 어떤 음악을 들어?", options:[
    {text:"신나는 팝이나 댄스 음악",axis:0},
    {text:"잔잔한 재즈나 클래식",axis:1},
    {text:"따뜻한 어쿠스틱 발라드",axis:2},
    {text:"몽환적인 인디나 사운드트랙",axis:3},
  ]},
  { text:"🖼️ 마음에 드는 그림 스타일은?", options:[
    {text:"강렬한 원색의 추상화",axis:0},
    {text:"선명하고 섬세한 수채화",axis:1},
    {text:"따뜻한 색감의 일상 그림",axis:2},
    {text:"어둡고 신비로운 분위기의 그림",axis:3},
  ]},
  { text:"🌃 기분이 처질 때 찾게 되는 것은?", options:[
    {text:"신나는 음악이나 운동",axis:0},
    {text:"조용한 공간에서 혼자 있기",axis:1},
    {text:"좋아하는 사람과 수다",axis:2},
    {text:"감성적인 영화나 책",axis:3},
  ]},
  { text:"💭 꿈에서 자주 등장하는 배경은?", options:[
    {text:"활기차고 사람 많은 도시",axis:0},
    {text:"고요한 바다나 강가",axis:1},
    {text:"따뜻하고 포근한 집",axis:2},
    {text:"신비로운 숲이나 우주",axis:3},
  ]},
  { text:"🌟 감동받을 때는?", options:[
    {text:"무언가를 성취했을 때",axis:0},
    {text:"아름다운 자연을 볼 때",axis:1},
    {text:"사람에게 따뜻함을 받을 때",axis:2},
    {text:"예술 작품이나 음악에서",axis:3},
  ]},
  { text:"🎭 지금 내 감정을 가장 잘 표현하는 단어는?", options:[
    {text:"열정 / 에너지 / 욕구",axis:0},
    {text:"평온 / 여유 / 고요",axis:1},
    {text:"따뜻함 / 행복 / 안도",axis:2},
    {text:"그리움 / 복잡함 / 깊이",axis:3},
  ]},
  { text:"🌈 나에게 가장 끌리는 색은?", options:[
    {text:"빨강 / 주황 - 열정의 색",axis:0},
    {text:"파랑 / 청록 - 고요의 색",axis:1},
    {text:"노랑 / 연두 - 생명의 색",axis:2},
    {text:"보라 / 남색 - 신비의 색",axis:3},
  ]},
];
let scores=[0,0,0,0], current=0;
function startTest(){ document.getElementById('intro-screen').style.display='none'; document.getElementById('quiz-screen').style.display='block'; showQuestion(); }
function showQuestion(){
  const q=questions[current];
  document.getElementById('q-num').textContent=`${current+1} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('progress-bar').style.width=`${(current/questions.length)*100}%`;
  const opts=document.getElementById('options'); opts.innerHTML='';
  q.options.forEach(o=>{ const btn=document.createElement('button'); btn.className='opt-btn'; btn.textContent=o.text; btn.onclick=()=>{ scores[o.axis]++; current++; current<questions.length?showQuestion():showResult(); }; opts.appendChild(btn); });
}
function showResult(fromUrl){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const top=scores.indexOf(Math.max(...scores)), r=results[top];
  document.getElementById('res-emoji').textContent=r.emoji;
  document.getElementById('res-label').textContent=r.label;
  document.getElementById('res-name').textContent=r.name;
  document.getElementById('res-sub').textContent=r.sub;
  document.getElementById('res-tag').textContent=r.tag;
  document.getElementById('res-desc').textContent=r.desc;
  document.getElementById('res-traits').innerHTML=r.traits.map(t=>`<span class="trait-tag">${t}</span>`).join('');
  if(r.extraLabel){ document.getElementById('extra-label-el').textContent=r.extraLabel; document.getElementById('res-extra').textContent=r.extraText; } else { document.getElementById('extra-label-el').style.display='none'; document.querySelector('.extra-box').style.display='none'; }
  document.getElementById('sc-emoji').textContent=r.emoji;
  document.getElementById('sc-title').textContent=r.name;
  document.getElementById('sc-sub').textContent=r.sub;
  document.getElementById('sc-tag').textContent=r.tag;
  if(!fromUrl) history.replaceState(null,'','?r='+top);
  window.scrollTo({top:0,behavior:'smooth'});
}
function copyLink(btn){ const url=location.origin+location.pathname+location.search; navigator.clipboard.writeText(url).then(()=>{ btn.textContent='✅ 링크 복사 완료!'; setTimeout(()=>btn.textContent='🔗 링크 복사해서 공유하기',2000); }); }
function restartTest(){ scores=[0,0,0,0]; current=0; document.getElementById('result-screen').style.display='none'; document.getElementById('intro-screen').style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); }
(function(){ const p=new URLSearchParams(location.search),r=p.get('r'); if(r!==null&&results[parseInt(r)]){ scores[parseInt(r)]=1; document.getElementById('intro-screen').style.display='none'; showResult(true); } })();
</script>
</body>
</html>
