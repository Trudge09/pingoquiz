<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나는 어떤 연애 스타일일까? 💌 연애 우주 탐험</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <meta property="og:title" content="나는 어떤 연애 스타일일까? 💌"/>
  <meta property="og:description" content="당신의 연애 행성을 찾아드려요. 우주 속 어떤 별처럼 사랑하나요?"/>
  <meta property="og:url" content="https://pingoquiz.netlify.app/love-style"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2274221145664784" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0d0818;
      --card: #130f24;
      --primary: #b57bee;
      --secondary: #f4a9ff;
      --gold: #ffd97d;
      --text: #f0e8ff;
      --muted: #8a7aaa;
      --border: #2a1f4a;
      --radius: 22px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 60px;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(181,123,238,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(244,169,255,0.1) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .back-btn {
      display: inline-block; margin: 20px 20px 0;
      color: var(--muted); font-size: 0.85rem; text-decoration: none;
      position: relative; z-index: 1;
    }
    .back-btn:hover { color: var(--primary); }
    .container { max-width: 520px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    .intro-screen { text-align: center; padding-top: 40px; }
    .hero-emoji { font-size: 5rem; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 { font-family: 'Jua', cursive; font-size: 1.8rem; color: var(--secondary); margin-bottom: 10px; line-height: 1.3; }
    .intro-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 32px; }
    .start-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 99px; padding: 16px 48px;
      font-family: 'Jua', cursive; font-size: 1.1rem; cursor: pointer;
      box-shadow: 0 4px 24px rgba(181,123,238,0.4); transition: transform 0.15s;
    }
    .start-btn:hover { transform: scale(1.04); }
    .quiz-screen { display: none; padding-top: 30px; }
    .progress-wrap { height: 4px; background: var(--border); border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 99px; transition: width 0.3s; }
    .q-num { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; }
    .q-text { font-family: 'Jua', cursive; font-size: 1.15rem; color: var(--text); margin-bottom: 24px; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .opt-btn {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px 18px; text-align: left;
      color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem;
      cursor: pointer; transition: all 0.15s; line-height: 1.5;
    }
    .opt-btn:hover { border-color: var(--primary); background: rgba(181,123,238,0.1); }
    .result-screen { display: none; padding-top: 30px; }
    .result-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 32px 24px;
    }
    .res-emoji { font-size: 4rem; text-align: center; display: block; margin-bottom: 12px; }
    .res-planet { font-size: 0.75rem; color: var(--primary); letter-spacing: 0.15em; text-align: center; margin-bottom: 6px; }
    .res-name { font-family: 'Jua', cursive; font-size: 1.6rem; color: var(--secondary); text-align: center; margin-bottom: 4px; }
    .res-sub { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 16px; }
    .res-tag { display: inline-block; background: rgba(181,123,238,0.15); color: var(--primary); border: 1px solid rgba(181,123,238,0.3); border-radius: 99px; padding: 4px 14px; font-size: 0.8rem; margin: 0 auto 20px; display: block; text-align: center; width: fit-content; margin-left: auto; margin-right: auto; }
    .section-title { font-family: 'Jua', cursive; font-size: 0.95rem; color: var(--gold); margin-bottom: 8px; margin-top: 20px; }
    .res-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.8; }
    .trait-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .trait-tag { background: rgba(181,123,238,0.12); color: var(--primary); border: 1px solid rgba(181,123,238,0.25); border-radius: 99px; padding: 4px 12px; font-size: 0.78rem; }
    .match-box { background: rgba(244,169,255,0.07); border: 1px solid rgba(244,169,255,0.2); border-radius: 14px; padding: 16px; margin-top: 8px; }
    .match-box p { font-size: 0.85rem; color: var(--text); line-height: 1.7; }
    .ad-slot { margin: 24px 0; }
    .share-btn {
      width: 100%; background: rgba(181,123,238,0.1); color: var(--primary);
      border: 1.5px solid rgba(181,123,238,0.3); border-radius: 99px; padding: 14px;
      font-family: 'Jua', cursive; font-size: 0.95rem; cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
    }
    .share-btn:hover { background: rgba(181,123,238,0.2); }
    .retry-btn {
      width: 100%; background: transparent; color: var(--muted);
      border: 1.5px solid var(--border); border-radius: 99px; padding: 12px;
      font-family: 'Jua', cursive; font-size: 0.9rem; cursor: pointer; transition: all 0.15s;
    }
    .retry-btn:hover { border-color: var(--muted); }
    .share-card-wrap { margin: 24px 0 0; background: linear-gradient(135deg,rgba(181,123,238,0.12),rgba(181,123,238,0.04)); border: 1.5px solid rgba(181,123,238,0.3); border-radius: 20px; padding: 28px 24px 20px; text-align: center; }
    .share-card-label { font-size: 0.72rem; color: var(--primary); letter-spacing: 0.15em; margin-bottom: 12px; font-weight: 700; }
    #sc-emoji { font-size: 2.8rem; margin-bottom: 8px; }
    #sc-title { font-family: 'Jua', cursive; font-size: 1.3rem; margin-bottom: 4px; }
    #sc-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    #sc-tag { display: inline-block; background: rgba(181,123,238,0.15); color: var(--primary); border: 1px solid rgba(181,123,238,0.3); border-radius: 99px; padding: 4px 14px; font-size: 0.78rem; margin-bottom: 8px; }
    .brand-txt { font-size: 0.62rem; color: rgba(150,150,150,0.35); letter-spacing: 0.1em; margin-top: 10px; }
    .hint-txt { font-size: 0.65rem; color: #666; margin-top: 6px; }
  </style>
</head>
<body>
<a class="back-btn" href="/">← 핑고퀴즈 홈으로</a>
<div class="container">

  <div class="intro-screen" id="intro-screen">
    <span class="hero-emoji">💌</span>
    <h1>나는 어떤<br/>연애 행성에 살까?</h1>
    <p class="intro-desc">우주 어딘가에는 당신만의 연애 행성이 있어요.<br/>8문항으로 당신의 사랑 방식을 찾아드릴게요.</p>
    <div class="ad-slot">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <button class="start-btn" onclick="startTest()">🚀 내 연애 행성 찾기</button>
  </div>

  <div class="quiz-screen" id="quiz-screen">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="q-num" id="q-num">1 / 8</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <div class="result-screen" id="result-screen">
    <div class="result-card" id="result-card">
      <span class="res-emoji" id="res-emoji"></span>
      <div class="res-planet" id="res-planet"></div>
      <div class="res-name" id="res-name"></div>
      <div class="res-sub" id="res-sub"></div>
      <div class="res-tag" id="res-tag"></div>
      <div class="section-title">💫 연애 방식</div>
      <div class="res-desc" id="res-desc"></div>
      <div class="section-title">✨ 키워드</div>
      <div class="trait-row" id="res-traits"></div>
      <div class="section-title">💕 당신과 잘 맞는 타입</div>
      <div class="match-box"><p id="res-match"></p></div>
    </div>
    <div class="ad-slot">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <div class="share-card-wrap">
      <div class="share-card-label">✦ 결과 공유 카드 ✦</div>
      <div id="sc-emoji"></div>
      <div id="sc-title"></div>
      <div id="sc-sub"></div>
      <div id="sc-tag"></div>
      <div class="hint-txt">📱 화면을 캡처해서 친구에게 공유해봐요!</div>
      <div class="brand-txt">pingoquiz</div>
    </div>
    <button class="share-btn" onclick="copyLink(this)">🔗 링크 복사해서 공유하기</button>
    <button class="retry-btn" onclick="restartTest()">🔄 다시 테스트하기</button>
  </div>

</div>
<script>
const questions = [
  { text: "💬 좋아하는 사람이 생기면 나는?", options: [
    { text: "먼저 적극적으로 다가간다", axis: 0 },
    { text: "천천히 관찰하다가 때를 기다린다", axis: 1 },
    { text: "친구처럼 가깝게 지내다 자연스럽게", axis: 2 },
    { text: "마음속으로만 좋아하다 끝날 수도...", axis: 3 }
  ]},
  { text: "💌 연인에게 애정 표현하는 방식은?", options: [
    { text: "직접 말로 자주 표현해", axis: 0 },
    { text: "행동으로 보여줘 (선물, 챙겨주기 등)", axis: 2 },
    { text: "함께 시간을 보내는 것 자체가 표현", axis: 2 },
    { text: "잘 못하지만 소중히 대하려고 해", axis: 3 }
  ]},
  { text: "💔 연인과 다툰 후 나의 반응은?", options: [
    { text: "바로 화해하자고 먼저 연락", axis: 0 },
    { text: "각자 시간 갖고 나서 대화", axis: 1 },
    { text: "혼자 속앓이하며 상대 눈치 봄", axis: 3 },
    { text: "별 일 아닌 척 평소처럼 행동", axis: 2 }
  ]},
  { text: "🏠 이상적인 연애 거리감은?", options: [
    { text: "매일 보고 연락해야 안심돼", axis: 0 },
    { text: "각자 생활도 있으면서 적당히 함께", axis: 2 },
    { text: "연락은 자주, 만남은 여유롭게", axis: 1 },
    { text: "서로 독립적으로, 만날 때 집중하는 것이 좋아", axis: 1 }
  ]},
  { text: "🌙 자다가 연인에게 연락이 없으면?", options: [
    { text: "무슨 일 있나? 먼저 연락함", axis: 0 },
    { text: "바쁜가 보다, 기다림", axis: 1 },
    { text: "신경 쓰이지만 참음", axis: 3 },
    { text: "크게 신경 안 씀", axis: 2 }
  ]},
  { text: "💭 연애에서 가장 중요한 건?", options: [
    { text: "설레임과 열정", axis: 0 },
    { text: "편안함과 신뢰", axis: 2 },
    { text: "서로에 대한 존중", axis: 1 },
    { text: "함께 성장하는 것", axis: 1 }
  ]},
  { text: "🎁 기념일을 챙기는 스타일은?", options: [
    { text: "100일, 1주년 다 챙김. 이벤트 좋아함", axis: 0 },
    { text: "중요한 날은 챙기되 부담없이", axis: 2 },
    { text: "딱히 날짜 의미 없고 매일이 소중해", axis: 1 },
    { text: "사실 잘 기억 못 함... 미안", axis: 3 }
  ]},
  { text: "💫 나에게 연애란?", options: [
    { text: "삶의 중심 에너지원!", axis: 0 },
    { text: "인생을 함께 걷는 파트너십", axis: 2 },
    { text: "서로를 성장시키는 관계", axis: 1 },
    { text: "있으면 좋고, 혼자도 괜찮아", axis: 3 }
  ]}
];

const results = {
  0: { emoji: "🔥", planet: "PASSION PLANET", name: "열정 폭발형", sub: "사랑 = 전력질주", tag: "온도 100°C 연애인", desc: "사랑에 빠지면 전력으로 달려가는 타입이에요. 설레임과 열정이 최고조일 때 가장 살아있음을 느껴요. 먼저 연락하고, 먼저 다가가고, 마음을 아낌없이 쏟아부어요. 가끔은 그 뜨거움이 상대에게 부담이 될 수 있지만, 그만큼 진심이에요.", traits: ["적극적", "감정 표현 풍부", "설레임 중시", "이벤트 좋아함"], match: "차분하고 든든한 타입과 잘 맞아요. 당신의 에너지를 받아주면서 편안함을 줄 수 있는 사람이 좋아요." },
  1: { emoji: "🌿", planet: "CALM PLANET", name: "신중 깊이형", sub: "사랑 = 천천히 깊어지는 것", tag: "깊은 우물 연애인", desc: "조용하지만 깊이 사랑하는 타입이에요. 빠르게 달아오르지 않지만 한번 마음을 열면 변하지 않아요. 상대를 충분히 알아가는 과정을 중요시하고, 서로 존중하는 관계를 추구해요.", traits: ["신중함", "깊은 신뢰", "독립적", "성장 지향"], match: "비슷하게 차분하거나, 먼저 다가오는 적극적인 타입과 잘 맞아요. 당신의 페이스를 기다려줄 수 있는 사람이 필요해요." },
  2: { emoji: "☀️", planet: "SUNNY PLANET", name: "편안 따뜻형", sub: "사랑 = 친구 같은 동반자", tag: "따뜻한 햇살 연애인", desc: "연인이자 베프인 관계를 추구해요. 함께 있을 때 편안하고 자연스러운 것이 최우선이에요. 거창한 이벤트보다 일상의 작은 순간들을 소중히 여기고, 서로 기대고 의지하는 관계를 좋아해요.", traits: ["편안함", "일상 중시", "자연스러움", "따뜻함"], match: "비슷하게 편안하고 일상을 중시하는 타입이 잘 맞아요. 함께 있을 때 숨 쉬듯 자연스러운 사람이 이상형이에요." },
  3: { emoji: "🌙", planet: "MOON PLANET", name: "조용한 관찰형", sub: "사랑 = 마음속 깊은 곳에", tag: "달빛 연애인", desc: "표현은 서툴러도 마음은 깊고 세심한 타입이에요. 상대의 작은 변화도 눈치채고, 말하지 않아도 챙겨주는 스타일이에요. 다가가는 것이 두렵기도 하지만, 한번 마음이 열리면 든든한 사람이에요.", traits: ["섬세함", "배려심", "내성적", "깊은 마음"], match: "먼저 다가오고 표현해주는 사람이 잘 맞아요. 당신의 마음을 끌어내줄 수 있는 따뜻하고 적극적인 사람이 필요해요." }
};

let scores = [0,0,0,0], current = 0;

function startTest() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `${current+1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-bar').style.width = `${(current/questions.length)*100}%`;
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o.text;
    btn.onclick = () => { scores[o.axis]++; current++; current < questions.length ? showQuestion() : showResult(); };
    opts.appendChild(btn);
  });
}

function showResult(fromUrl) {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const top = scores.indexOf(Math.max(...scores));
  const r = results[top];
  document.getElementById('res-emoji').textContent = r.emoji;
  document.getElementById('res-planet').textContent = r.planet;
  document.getElementById('res-name').textContent = r.name;
  document.getElementById('res-sub').textContent = r.sub;
  document.getElementById('res-tag').textContent = r.tag;
  document.getElementById('res-desc').textContent = r.desc;
  document.getElementById('res-traits').innerHTML = r.traits.map(t=>`<span class="trait-tag">${t}</span>`).join('');
  document.getElementById('res-match').textContent = r.match;
  document.getElementById('sc-emoji').textContent = r.emoji;
  document.getElementById('sc-title').textContent = r.name;
  document.getElementById('sc-sub').textContent = r.sub;
  document.getElementById('sc-tag').textContent = r.tag;
  if (!fromUrl) history.replaceState(null,'','?r='+top);
  window.scrollTo({top:0,behavior:'smooth'});
}

function copyLink(btn) {
  const url = location.origin + location.pathname + location.search;
  navigator.clipboard.writeText(url).then(()=>{
    btn.textContent='✅ 링크 복사 완료!';
    setTimeout(()=>btn.textContent='🔗 링크 복사해서 공유하기',2000);
  });
}

function restartTest() {
  scores=[0,0,0,0]; current=0;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('intro-screen').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

(function(){
  const p=new URLSearchParams(location.search), r=p.get('r');
  if(r!==null && results[parseInt(r)]){
    scores[parseInt(r)]=1;
    document.getElementById('intro-screen').style.display='none';
    showResult(true);
  }
})();
</script>
</body>
</html>
