    {text:"강하고 카리스마 있는 사람",axis:5},
    {text:"예의 바르고 차분한 사람",axis:1},
    {text:"독립적이고 거리감 있는 사람",axis:4},
  ]},
  {text:"❓ 친한 친구가 나에 대해 뭐라고 할까?",options:[
    {text:"같이 있으면 즐겁고 재밌어",axis:3},
    {text:"마음 따뜻하고 배려심 있어",axis:0},
    {text:"뭔가 알 수 없어, 근데 신경 쓰여",axis:2},
    {text:"강하고 믿음직해, 근데 좀 무서워",axis:5},
    {text:"믿을 수 있고 든든해",axis:1},
    {text:"독립적이고 자기 세계가 있어",axis:4},
  ]},
];
let scores = [0,0,0,0,0,0], current = 0;
function startTest() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}
function showQuestion() {
  const q = questions[current];
  document.getElementById('q-num').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-bar').style.width = ((current / questions.length) * 100) + '%';
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach(function(o) {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o.text;
    btn.onclick = function() {
      scores[o.axis]++;
      current++;
      if (current < questions.length) showQuestion(); else showResult(false);
    };
    opts.appendChild(btn);
  });
}
function showResult(fromUrl) {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const top = scores.indexOf(Math.max.apply(null, scores));
  const r = results[top];
  document.getElementById('res-emoji').textContent = r.emoji;
  document.getElementById('res-label').textContent = r.label;
  document.getElementById('res-name').textContent = r.name;
  document.getElementById('res-sub').textContent = r.sub;
  document.getElementById('res-tag').textContent = r.tag;
  document.getElementById('res-desc').textContent = r.desc;
  document.getElementById('res-traits').innerHTML = r.traits.map(function(t) { return '<span class="trait-tag">' + t + '</span>'; }).join('');
  document.getElementById('extra-title').textContent = '💡 한마디';
  document.getElementById('res-extra').textContent = r.extra;
  document.getElementById('sc-emoji').textContent = r.emoji;
  document.getElementById('sc-title').textContent = r.name;
  document.getElementById('sc-sub').textContent = r.sub;
  document.getElementById('sc-tag').textContent = r.tag;
  if (!fromUrl) { try { history.replaceState(null, '', '?r=' + top); } catch(e) {} }
  window.scrollTo({top: 0, behavior: 'smooth'});
}
function copyLink(btn) {
  const url = location.origin + location.pathname + location.search;
  navigator.clipboard.writeText(url).then(function() {
    btn.textContent = '✅ 링크 복사 완료!';
    setTimeout(function() { btn.textContent = '🔗 링크 복사해서 공유하기'; }, 2000);
  });
}
function restartTest() {
  scores = [0,0,0,0,0,0];
  current = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display = 'block';
  window.scrollTo({top: 0, behavior: 'smooth'});
}
(function() {
  const p = new URLSearchParams(location.search);
  const r = p.get('r');
  if (r !== null && results[parseInt(r)]) {
    scores[parseInt(r)] = 1;
    document.getElementById('intro-screen').style.display = 'none';
    showResult(true);
  }
})();
</script>
