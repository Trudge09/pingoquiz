<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meow2048 - 고양이 테마 2048 게임</title>
  <meta name="description" content="귀여운 고양이 이모지와 함께하는 2048 퍼즐 게임! 아기 고양이부터 고양이 신까지 진화시켜보세요." />
  <style>
/* ===== Meow2048 스타일 ===== */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #faf5ef;
  --fg: #5a2d3e;
  --primary: #e88aa5;
  --primary-fg: #fff;
  --secondary: #a3d5e0;
  --secondary-fg: #1a4a5a;
  --accent: #f5ce6e;
  --accent-fg: #5a4520;
  --muted: #ede4da;
  --muted-fg: #907a6e;
  --board-bg: #c9b8a4;
  --cell-bg: #ddd2c5;
  --radius: 14px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-user-select: none;
  user-select: none;
  overflow-x: hidden;
}

/* 광고 */
.ad-container {
  width: 100%;
  max-width: 400px;
  margin: 8px auto;
}

/* 게임 래퍼 */
.game-wrapper {
  width: 100%;
  max-width: 380px;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 헤더 */
.header {
  width: 100%;
  max-width: 340px;
  margin-top: 12px;
}

.title {
  font-size: 2rem;
  font-weight: 900;
  text-align: center;
  color: var(--primary);
  letter-spacing: -1px;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
}

.scores {
  display: flex;
  gap: 8px;
}

.score-box {
  background: var(--primary);
  border-radius: var(--radius);
  padding: 6px 14px;
  text-align: center;
  min-width: 70px;
}

.score-label {
  color: var(--primary-fg);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.score-value {
  color: var(--primary-fg);
  font-size: 1.15rem;
  font-weight: 900;
  line-height: 1.2;
}

/* 버튼 */
.btn {
  border: none;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  border-radius: var(--radius);
  font-size: 0.9rem;
  transition: transform 0.1s;
  text-decoration: none;
  display: inline-block;
  text-align: center;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: var(--primary);
  color: var(--primary-fg);
  padding: 10px 20px;
}

.btn-secondary {
  background: var(--secondary);
  color: var(--secondary-fg);
  padding: 10px 20px;
}

.btn-accent {
  background: var(--accent);
  color: var(--accent-fg);
  padding: 10px 16px;
}

.btn-full { width: 100%; }

/* 보드 */
.board-container {
  position: relative;
  width: 100%;
  max-width: 340px;
  margin-top: 14px;
}

.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  background: var(--board-bg);
  border-radius: 16px;
  padding: 10px;
  aspect-ratio: 1;
}

.cell {
  background: var(--cell-bg);
  border-radius: 12px;
}

/* 타일 레이어 */
.tile-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

.tile {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-weight: 800;
  transition: top 0.12s ease, left 0.12s ease;
}

.tile-emoji {
  font-size: 1.8rem;
  line-height: 1;
}

.tile-value {
  font-size: 0.85rem;
  color: var(--fg);
  margin-top: 2px;
  line-height: 1;
}

/* 타일 배경색 */
.tile-2    { background: #ffeebb; }
.tile-4    { background: #f5d99a; }
.tile-8    { background: #e8c475; }
.tile-16   { background: #d4a5d8; }
.tile-32   { background: #a3d5e0; }
.tile-64   { background: #e88aa5; }
.tile-128  { background: #d49ae0; }
.tile-256  { background: #b3a0e8; }
.tile-512  { background: #f5ce6e; }
.tile-1024 { background: #f0b84a; }
.tile-2048 { background: #e85580; }

/* 큰 숫자 폰트 축소 */
.tile-1024 .tile-value,
.tile-2048 .tile-value { font-size: 0.7rem; }
.tile-128 .tile-value,
.tile-256 .tile-value,
.tile-512 .tile-value { font-size: 0.75rem; }

/* 애니메이션 */
@keyframes tile-pop {
  0%   { transform: scale(0); }
  50%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
@keyframes tile-merge {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
@keyframes slide-up {
  from { transform: translateY(10px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
@keyframes celebrate {
  0%, 100% { transform: scale(1) rotate(0deg); }
  25%  { transform: scale(1.05) rotate(-2deg); }
  50%  { transform: scale(1.1) rotate(0deg); }
  75%  { transform: scale(1.05) rotate(2deg); }
}

.tile-new    { animation: tile-pop 0.25s ease-out; }
.tile-merged { animation: tile-merge 0.3s ease-out; }
.celebrate   { animation: celebrate 0.6s ease-in-out; }
.slide-up    { animation: slide-up 0.3s ease-out; }

/* 오버레이 */
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(90, 45, 62, 0.4);
  border-radius: 16px;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay.active {
  display: flex;
}
.overlay-win.active {
  background: rgba(245, 206, 110, 0.55);
}

.overlay-box {
  background: var(--bg);
  border-radius: 18px;
  padding: 28px 32px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
}

.overlay-emoji { font-size: 2.5rem; }
.overlay-title { font-size: 1.4rem; font-weight: 900; margin-top: 4px; }
.overlay-sub   { color: var(--muted-fg); font-size: 0.9rem; margin-top: 4px; }
.overlay-box .btn { margin-top: 16px; }

/* 하단 버튼 */
.bottom-buttons {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
  margin-bottom: 16px;
}

/* 반응형 - 작은 화면 */
@media (max-width: 360px) {
  .board { gap: 8px; padding: 8px; }
  .tile-emoji { font-size: 1.4rem; }
  .tile-value { font-size: 0.7rem; }
  .title { font-size: 1.6rem; }
}

</style>

          <div class="score-box">
            <div class="score-label">점수</div>
            <div class="score-value" id="score">0</div>

    <div class="board-container">
      <div class="board" id="board">
        <!-- 빈 셀 배경 -->
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
      <!-- 타일 레이어 -->
      <div class="tile-layer" id="tile-layer"></div>

      <!-- 게임오버 오버레이 -->
      <div class="overlay" id="game-over-overlay">
        <div class="overlay-box">
          <p class="overlay-emoji">😿</p>

      <!-- 승리 오버레이 -->
      <div class="overlay overlay-win" id="win-overlay">
        <div class="overlay-box celebrate">
          <p class="overlay-emoji">👑</p>
          <p class="overlay-title">축하합니다!</p>

      <a href="https://pingoquiz.vercel.app" target="_blank" rel="noopener noreferrer" class="btn btn-secondary btn-full">🎮 다른 테스트 보러 가기</a>
    </div>

  <!-- 하단 광고 -->
  <div class="ad-container">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>

  <script>
/* ===== Meow2048 게임 로직 ===== */

// 고양이 단계 매핑
const CAT_MAP = {
  2:    { emoji: "🐣", name: "아기 고양이" },
  4:    { emoji: "🐱", name: "작은 고양이" },
  8:    { emoji: "😸", name: "장난꾸러기 고양이" },
  16:   { emoji: "😴", name: "졸린 고양이" },
  32:   { emoji: "😺", name: "통통 고양이" },
  64:   { emoji: "🙀", name: "왕 고양이" },
  128:  { emoji: "😻", name: "마법 고양이" },
  256:  { emoji: "🌙", name: "우주 고양이" },
  512:  { emoji: "⭐", name: "전설 고양이" },
  1024: { emoji: "🌟", name: "신화 고양이" },
  2048: { emoji: "👑", name: "고양이 신" },
};

// 게임 상태
let grid = [];        // 4x4 배열, 0이면 빈칸
let score = 0;
let bestScore = parseInt(localStorage.getItem("meow2048-best") || "0", 10);
let gameOver = false;
let won = false;
let wonAcknowledged = false;
let isMoving = false;

// DOM 요소
const tileLayer = document.getElementById("tile-layer");
const scoreEl = document.getElementById("score");
const bestScoreEl = document.getElementById("best-score");
const gameOverOverlay = document.getElementById("game-over-overlay");
const winOverlay = document.getElementById("win-overlay");
const finalScoreText = document.getElementById("final-score-text");

// 초기화
function init() {
  grid = Array.from({ length: 4 }, () => Array(4).fill(0));
  score = 0;
  gameOver = false;
  won = false;
  wonAcknowledged = false;
  isMoving = false;
  gameOverOverlay.classList.remove("active");
  winOverlay.classList.remove("active");
  addRandomTile();
  addRandomTile();
  updateUI();
}

// 빈 셀 찾기
function getEmptyCells() {
  const cells = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] === 0) cells.push([r, c]);
  return cells;
}

// 랜덤 타일 추가
function addRandomTile() {
  const empty = getEmptyCells();
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  // 새 타일 위치 기록 (애니메이션용)
  addRandomTile._lastNew = [r, c];
}

// 한 줄 슬라이드 & 합치기 (왼쪽 방향 기준)
function slideLine(line) {
  const tiles = line.filter(v => v !== 0);
  const result = [];
  let gained = 0;
  let mergedPositions = [];

  for (let i = 0; i < tiles.length; i++) {
    if (i + 1 < tiles.length && tiles[i] === tiles[i + 1]) {
      const merged = tiles[i] * 2;
      result.push(merged);
      gained += merged;
      mergedPositions.push(result.length - 1);
      i++; // 다음 타일 건너뛰기
    } else {
      result.push(tiles[i]);
    }
  }

  while (result.length < 4) result.push(0);
  return { result, gained, mergedPositions };
}

// 그리드 이동
function move(direction) {
  if (gameOver || isMoving) return;
  isMoving = true;

  let totalGained = 0;
  let moved = false;
  const mergedCells = []; // 합쳐진 셀 좌표

  for (let i = 0; i < 4; i++) {
    let line = [];

    // 방향에 따라 라인 추출
    switch (direction) {
      case "left":
        line = [grid[i][0], grid[i][1], grid[i][2], grid[i][3]];
        break;
      case "right":
        line = [grid[i][3], grid[i][2], grid[i][1], grid[i][0]];
        break;
      case "up":
        line = [grid[0][i], grid[1][i], grid[2][i], grid[3][i]];
        break;
      case "down":
        line = [grid[3][i], grid[2][i], grid[1][i], grid[0][i]];
        break;
    }

    const { result, gained, mergedPositions } = slideLine(line);
    totalGained += gained;

    // 결과를 그리드에 배치
    for (let j = 0; j < 4; j++) {
      let r, c;
      switch (direction) {
        case "left":  r = i; c = j; break;
        case "right": r = i; c = 3 - j; break;
        case "up":    r = j; c = i; break;
        case "down":  r = 3 - j; c = i; break;
      }

      if (grid[r][c] !== result[j]) moved = true;
      grid[r][c] = result[j];

      if (mergedPositions.includes(j)) {
        mergedCells.push([r, c]);
      }
    }
  }

  if (!moved) {
    isMoving = false;
    return;
  }

  score += totalGained;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem("meow2048-best", String(bestScore));
  }

  addRandomTile();
  updateUI(addRandomTile._lastNew, mergedCells);

  // 2048 달성 확인
  if (!wonAcknowledged) {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 4; c++)
        if (grid[r][c] === 2048) {
          won = true;
          winOverlay.classList.add("active");
        }
  }

  // 게임오버 확인
  if (isGameOver()) {
    gameOver = true;
    finalScoreText.textContent = "최종 점수: " + score;
    gameOverOverlay.classList.add("active");
  }

  setTimeout(() => { isMoving = false; }, 120);
}

// 게임오버 판정
function isGameOver() {
  if (getEmptyCells().length > 0) return false;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const v = grid[r][c];
      if (c < 3 && v === grid[r][c + 1]) return false;
      if (r < 3 && v === grid[r + 1][c]) return false;
    }
  }
  return true;
}

// UI 업데이트 (타일 렌더링)
function updateUI(newCell, mergedCells) {
  scoreEl.textContent = score;
  bestScoreEl.textContent = bestScore;

  // 보드 크기 계산
  const boardEl = document.getElementById("board");
  const boardRect = boardEl.getBoundingClientRect();
  const padding = 10;
  const gap = 10;
  const cellSize = (boardRect.width - padding * 2 - gap * 3) / 4;

  tileLayer.innerHTML = "";

  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const val = grid[r][c];
      if (val === 0) continue;

      const cat = CAT_MAP[val] || { emoji: "🐱" };

      const tile = document.createElement("div");
      tile.className = "tile tile-" + val;

      // 새 타일 애니메이션
      if (newCell && newCell[0] === r && newCell[1] === c) {
        tile.classList.add("tile-new");
      }
      // 합쳐진 타일 애니메이션
      if (mergedCells) {
        for (const mc of mergedCells) {
          if (mc[0] === r && mc[1] === c) {
            tile.classList.add("tile-merged");
            break;
          }
        }
      }

      tile.style.width = cellSize + "px";
      tile.style.height = cellSize + "px";
      tile.style.top = (padding + r * (cellSize + gap)) + "px";
      tile.style.left = (padding + c * (cellSize + gap)) + "px";

      tile.innerHTML =
        '<span class="tile-emoji">' + cat.emoji + '</span>' +
        '<span class="tile-value">' + val + '</span>';

      tileLayer.appendChild(tile);
    }
  }
}

// ===== 이벤트 리스너 =====

// 키보드
document.addEventListener("keydown", function (e) {
  switch (e.key) {
    case "ArrowUp":    e.preventDefault(); move("up"); break;
    case "ArrowDown":  e.preventDefault(); move("down"); break;
    case "ArrowLeft":  e.preventDefault(); move("left"); break;
    case "ArrowRight": e.preventDefault(); move("right"); break;
  }
});

// 터치 스와이프
let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", function (e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener("touchend", function (e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;

  if (absDx > absDy) {
    move(dx > 0 ? "right" : "left");
  } else {
    move(dy > 0 ? "down" : "up");
  }
}, { passive: true });

// 페이지 스크롤 방지 (모바일 스와이프 시)
document.addEventListener("touchmove", function (e) {
  e.preventDefault();
}, { passive: false });

// 버튼 이벤트
document.getElementById("restart-btn").addEventListener("click", init);
document.getElementById("gameover-restart-btn").addEventListener("click", init);
document.getElementById("replay-btn").addEventListener("click", init);
document.getElementById("continue-btn").addEventListener("click", function () {
  won = false;
  wonAcknowledged = true;
  winOverlay.classList.remove("active");
});

// 윈도우 리사이즈 시 타일 재렌더링
window.addEventListener("resize", function () { updateUI(); });

// 게임 시작!
init();

</script>
