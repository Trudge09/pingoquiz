<script>
const results = {
  0: { emoji:"⚓", label:"PAST EXPLORER", name:"대항해 시대의 탐험가", sub:"자유를 향해 끝없이 항해했던 영혼", tag:"모험의 피가 흐르는 영혼", desc:"전생에 당신은 미지의 세계를 향해 나아가던 탐험가였어요. 새로운 땅을 발견하고, 지평선 너머를 항상 꿈꿨죠. 지금 생에도 그 본능이 남아있어요. 새로운 것에 대한 호기심, 모험을 향한 열망이 그 증거예요.", traits:["모험심", "자유로운 영혼", "호기심", "개척자"], extraLabel:"🔮 전생의 흔적", extraText:"현생에서 이유 없이 여행이 하고 싶거나, 지도를 보면 설레는 느낌이 드는 것이 전생의 기억이에요." },
  1: { emoji:"📜", label:"PAST SCHOLAR", name:"고대의 학자 또는 사제", sub:"지식과 진리를 추구했던 영혼", tag:"지혜의 불꽃이 타오르는 영혼", desc:"전생에 당신은 지식과 학문을 삶의 전부로 여겼던 학자나 사제였어요. 글을 쓰고, 가르치고, 진리를 탐구했죠. 지금도 배우는 것을 즐기고, 알 수 없는 것에 대한 탐구 본능이 남아있어요.", traits:["지적 탐구", "기록 본능", "통찰력", "전달자"], extraLabel:"🔮 전생의 흔적", extraText:"현생에서 책이나 글에 유독 끌리거나, 가르치는 역할이 자연스럽게 느껴지는 것이 전생의 기억이에요." },
  2: { emoji:"🏺", label:"PAST MERCHANT", name:"실크로드의 상인 또는 외교관", sub:"사람을 잇고 세상을 연결했던 영혼", tag:"연결하는 자의 영혼", desc:"전생에 당신은 동서양을 오가며 사람과 문화를 연결했던 상인이나 외교관이었어요. 다양한 사람들을 이어주고, 갈등을 조율하고, 세상을 더 크게 보았죠. 지금도 사람 사이에서 자연스러운 중재 능력이 남아있어요.", traits:["소통력", "연결고리", "협상가", "다양한 시야"], extraLabel:"🔮 전생의 흔적", extraText:"현생에서 다양한 사람들과 쉽게 어울리거나, 갈등 상황에서 자연스럽게 중재하게 되는 것이 전생의 기억이에요." },
  3: { emoji:"🌿", label:"PAST SHAMAN", name:"자연과 함께한 치유자", sub:"대지와 하나였던 영혼", tag:"자연의 기억을 품은 영혼", desc:"전생에 당신은 자연과 깊이 연결된 치유자나 무당이었어요. 동물과 식물의 언어를 알고, 계절의 리듬에 맞춰 살았죠. 지금도 자연 속에서 유독 편안함을 느끼고, 생명에 대한 감수성이 남아있어요.", traits:["자연 친화", "치유 능력", "직관력", "감수성"], extraLabel:"🔮 전생의 흔적", extraText:"현생에서 자연 속에 있을 때 유독 편안함을 느끼거나, 동물이 먼저 다가오는 경험이 전생의 기억이에요." },
};
const questions = [
  { text:"🌙 잠들기 전에 자주 떠오르는 이미지는?", options:[
    {text:"광대한 바다나 수평선",axis:0},
    {text:"오래된 책과 촛불",axis:1},
    {text:"붐비는 저잣거리",axis:2},
    {text:"고요한 숲과 달빛",axis:3},
  ]},
  { text:"💡 처음 배우는 건데 이상하게 잘 하는 것은?", options:[
    {text:"방향감각, 지형 읽기",axis:0},
    {text:"글쓰기나 언어 감각",axis:1},
    {text:"사람 사이 조율, 협상",axis:2},
    {text:"자연 관찰, 동식물 감각",axis:3},
  ]},
  { text:"🎭 운명이 있다고 생각할 때 드는 느낌은?", options:[
    {text:"거대한 힘이 날 이끄는 것 같다",axis:0},
    {text:"알 수 없는 사명이 있는 것 같다",axis:1},
    {text:"전부터 알았던 것을 다시 깨닫는 느낌",axis:2},
    {text:"자연의 순환 속에 있는 느낌",axis:3},
  ]},
  { text:"😔 이유 없이 외롭거나 그리운 감정이 드는 건?", options:[
    {text:"드넓은 곳을 자유롭게 돌아다니던 기억",axis:0},
    {text:"중요한 무언가를 잃어버린 느낌",axis:1},
    {text:"많은 사람들 속 연결감",axis:2},
    {text:"자연 속에 혼자였던 고요한 기억",axis:3},
  ]},
  { text:"🏛️ 역사 속 어떤 시대가 왠지 친숙해?", options:[
    {text:"대항해 시대, 탐험의 시대",axis:0},
    {text:"르네상스, 학문과 예술의 시대",axis:1},
    {text:"고대 시장, 실크로드 상인의 시대",axis:2},
    {text:"고대 부족, 자연과 함께한 시대",axis:3},
  ]},
  { text:"⚔️ 전쟁이 일어난다면 나는?", options:[
    {text:"전선에서 군인이나 항해사로",axis:0},
    {text:"전략을 짜는 참모나 기록자",axis:1},
    {text:"뒤에서 물자와 정보를 관리",axis:2},
    {text:"치료사나 자연 속 피난처 제공",axis:3},
  ]},
  { text:"🌟 나의 삶에서 가장 의미 있는 것은?", options:[
    {text:"새로운 것을 발견하고 탐험하는 것",axis:0},
    {text:"지식을 쌓고 후세에 전하는 것",axis:1},
    {text:"사람들 사이에서 연결고리가 되는 것",axis:2},
    {text:"자연과 조화롭게 사는 것",axis:3},
  ]},
  { text:"💭 가장 끌리는 초자연적 능력은?", options:[
    {text:"어디든 갈 수 있는 자유",axis:0},
    {text:"진실을 꿰뚫어 보는 지혜",axis:1},
    {text:"마음을 읽는 공감 능력",axis:2},
    {text:"자연과 교감하는 능력",axis:3},
  ]},
];
let scores=[0,0,0,0], current=0;
function startTest(){ document.getElementById('intro-screen').style.display='none'; document.getElementById('quiz-screen').style.display='block'; showQuestion(); }
function showQuestion(){
  const q=questions[current];
  document.getElementById('q-num').textContent=`${current+1} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('progress-bar').style.width=`${(current/questions.length)*100}%`;
  const opts=document.getElementById('options'); opts.innerHTML='';
  q.options.forEach(o=>{ const btn=document.createElement('button'); btn.className='opt-btn'; btn.textContent=o.text; btn.onclick=()=>{ scores[o.axis]++; current++; current<questions.length?showQuestion():showResult(); }; opts.appendChild(btn); });
}
function showResult(fromUrl){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const top=scores.indexOf(Math.max(...scores)), r=results[top];
  document.getElementById('res-emoji').textContent=r.emoji;
  document.getElementById('res-label').textContent=r.label;
  document.getElementById('res-name').textContent=r.name;
  document.getElementById('res-sub').textContent=r.sub;
  document.getElementById('res-tag').textContent=r.tag;
  document.getElementById('res-desc').textContent=r.desc;
  document.getElementById('res-traits').innerHTML=r.traits.map(t=>`<span class="trait-tag">${t}</span>`).join('');
  if(r.extraLabel){ document.getElementById('extra-label-el').textContent=r.extraLabel; document.getElementById('res-extra').textContent=r.extraText; } else { document.getElementById('extra-label-el').style.display='none'; document.querySelector('.extra-box').style.display='none'; }
  document.getElementById('sc-emoji').textContent=r.emoji;
  document.getElementById('sc-title').textContent=r.name;
  document.getElementById('sc-sub').textContent=r.sub;
  document.getElementById('sc-tag').textContent=r.tag;
  if(!fromUrl) history.replaceState(null,'','?r='+top);
  window.scrollTo({top:0,behavior:'smooth'});
}
function copyLink(btn){ const url=location.origin+location.pathname+location.search; navigator.clipboard.writeText(url).then(()=>{ btn.textContent='✅ 링크 복사 완료!'; setTimeout(()=>btn.textContent='🔗 링크 복사해서 공유하기',2000); }); }
function restartTest(){ scores=[0,0,0,0]; current=0; document.getElementById('result-screen').style.display='none'; document.getElementById('intro-screen').style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); }
(function(){ const p=new URLSearchParams(location.search),r=p.get('r'); if(r!==null&&results[parseInt(r)]){ scores[parseInt(r)]=1; document.getElementById('intro-screen').style.display='none'; showResult(true); } })();
</script>
