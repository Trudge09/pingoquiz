<head>

  <meta property="og:title" content="오늘 뭐 먹지? 🍽️ 메뉴 추천기"/>
  <meta property="og:description" content="랜덤 추천 or 취향 필터로 오늘 메뉴 정하기!"/>
  <meta property="og:image" content="https://pingoquiz/og-image.png"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2274221145664784" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #fffbf0;
      --card: #ffffff;
      --card2: #fff8ee;
      --orange: #f07020;
      --orange2: #f8a040;
      --yellow: #ffc840;
      --red: #e03030;
      --green: #40a060;
      --text: #2a1800;
      --muted: #a07840;
      --border: #f0dfc0;
      --radius: 18px;
      --shadow: 0 4px 20px rgba(240,112,32,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 60px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -80px; right: -80px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(248,160,64,0.1) 0%, transparent 65%);
      pointer-events: none; z-index: 0;
    }
    .top-bar { height: 4px; background: linear-gradient(90deg, #f07020, #ffc840, #e03030, #40a060, #f07020); }
    .wrap { max-width: 600px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }
    .ad-slot {
      margin: 0 auto 24px; background: var(--card); border: 1.5px dashed var(--border);
      border-radius: 12px; padding: 14px; text-align: center; min-height: 90px;
      display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow);
    }
    .back-btn {
      display: block; text-align: left; color: var(--muted); font-size: 0.85rem;
      text-decoration: none; margin: 28px 0 20px; transition: color 0.15s;
    }
    .back-btn:hover { color: var(--orange); }

    /* 헤더 */
    .page-header { text-align: center; padding: 10px 0 28px; }
    .header-emoji { font-size: 4rem; display: block; margin-bottom: 10px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 { font-family: 'Jua', cursive; font-size: clamp(1.6rem,5vw,2.2rem); margin-bottom: 6px; }
    h1 span {
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-sub { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }

    /* 탭 */
    .mode-tabs {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .mode-tab {
      flex: 1; background: var(--card); border: 2px solid var(--border);
      border-radius: 14px; padding: 16px 10px; text-align: center;
      cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow);
    }
    .mode-tab:hover { border-color: var(--orange); }
    .mode-tab.active { background: var(--orange); border-color: var(--orange); color: white; }
    .mode-tab-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
    .mode-tab-name { font-family: 'Jua', cursive; font-size: 0.95rem; }
    .mode-tab-desc { font-size: 0.75rem; opacity: 0.7; margin-top: 2px; }

    /* 랜덤 모드 */
    #random-mode { display: block; }
    .random-btn {
      width: 100%; height: 140px;
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      border: none; border-radius: var(--radius); cursor: pointer;
      font-family: 'Jua', cursive; font-size: 1.5rem; color: white;
      box-shadow: 0 8px 28px rgba(240,112,32,0.3);
      transition: all 0.15s; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px;
    }
    .random-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 12px 36px rgba(240,112,32,0.4); }
    .random-btn:active { transform: scale(0.98); }
    .random-btn-icon { font-size: 2.5rem; animation: spin 3s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }

    /* 랜덤 결과 */
    .random-result-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;
    }
    .random-result-item {
      background: var(--card); border: 2px solid var(--border);
      border-radius: 14px; padding: 16px 10px; text-align: center;
      box-shadow: var(--shadow); transition: all 0.2s;
      animation: popIn 0.3s ease both;
    }
    .random-result-item:nth-child(2) { animation-delay: 0.05s; }
    .random-result-item:nth-child(3) { animation-delay: 0.1s; }
    @keyframes popIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
    .rri-emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
    .rri-name { font-family: 'Jua', cursive; font-size: 0.95rem; color: var(--text); margin-bottom: 3px; }
    .rri-tag {
      font-size: 0.72rem; color: var(--muted);
      background: var(--card2); border-radius: 99px; padding: 2px 8px; display: inline-block;
    }

    /* 필터 모드 */
    #filter-mode { display: none; }
    .filter-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
    }
    .filter-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--orange), var(--yellow));
    }
    .filter-title {
      font-family: 'Jua', cursive; font-size: 0.92rem; color: var(--orange);
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--card2); border: 1.5px solid var(--border);
      border-radius: 99px; padding: 7px 16px;
      font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--orange); }
    .chip.selected { background: var(--orange); border-color: var(--orange); color: white; font-weight: 700; }

    .filter-submit-btn {
      width: 100%; background: linear-gradient(135deg, var(--orange), var(--yellow));
      color: white; border: none; border-radius: 99px; padding: 18px;
      font-family: 'Jua', cursive; font-size: 1.1rem; cursor: pointer;
      box-shadow: 0 6px 24px rgba(240,112,32,0.3); transition: all 0.15s; margin-bottom: 16px;
    }
    .filter-submit-btn:hover { transform: translateY(-2px); }

    /* 필터 결과 */
    #filter-results { display: none; }
    .filter-result-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .filter-result-item {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px 18px; display: flex;
      align-items: center; gap: 14px; box-shadow: var(--shadow);
      animation: slideIn 0.3s ease both;
    }
    .filter-result-item:nth-child(2) { animation-delay: 0.06s; }
    .filter-result-item:nth-child(3) { animation-delay: 0.12s; }
    .filter-result-item:nth-child(4) { animation-delay: 0.18s; }
    .filter-result-item:nth-child(5) { animation-delay: 0.24s; }
    @keyframes slideIn { from{opacity:0;transform:translateX(-16px)} to{opacity:1;transform:translateX(0)} }
    .fri-emoji { font-size: 2rem; min-width: 36px; }
    .fri-body { flex: 1; }
    .fri-name { font-family: 'Jua', cursive; font-size: 1rem; color: var(--text); margin-bottom: 3px; }
    .fri-info { font-size: 0.78rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 4px; }
    .fri-badge {
      background: var(--card2); border-radius: 99px;
      padding: 2px 8px; font-size: 0.72rem; color: var(--muted);
    }
    .no-result {
      text-align: center; padding: 40px 20px;
      background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border);
      font-family: 'Jua', cursive; color: var(--muted); font-size: 1rem;
    }
    .reset-filter-btn {
      width: 100%; background: var(--card2); color: var(--orange);
      border: 1.5px solid var(--border); border-radius: 99px; padding: 13px;
      font-family: 'Jua', cursive; font-size: 0.95rem; cursor: pointer; transition: all 0.15s;
    }
    .reset-filter-btn:hover { border-color: var(--orange); }

  
    .rec-section { margin: 28px 0 8px; }
    .rec-label { text-align:center; font-size:0.72rem; letter-spacing:0.15em;
      color:var(--primary, #9b59f5); font-weight:700; margin-bottom:14px; }
    .rec-card { display:flex; align-items:center; gap:12px;
      background:var(--card, #fff); border:1.5px solid var(--border, #ede8ff);
      border-radius:14px; padding:14px 18px; margin-bottom:10px;
      text-decoration:none; color:inherit; transition:all 0.15s; }
    .rec-card:hover { border-color:var(--primary, #9b59f5); transform:translateX(4px); }
    .rec-emoji { font-size:1.6rem; flex-shrink:0; }
    .rec-title { flex:1; font-size:0.9rem; font-weight:700; color:var(--text, #1a1a2e); }
    .rec-arrow { font-size:0.9rem; color:var(--primary, #9b59f5); flex-shrink:0; }
  </style>
</head>

    <div class="filter-card">

    </div>
    <div class="filter-card">

    <div class="filter-card">

    <div class="filter-card">

      <div class="chip-row" id="f-amount"></div>
    </div>
    <button class="filter-submit-btn" onclick="filterMenu()">🍽️ 이걸로 추천해줘!</button>

    <div id="filter-results">
      <div class="filter-result-list" id="filter-result-list"></div>
      <div class="ad-slot">
        <ins class="adsbygoogle" style="display:block"
          data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177"
          data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <button class="reset-filter-btn" onclick="resetFilter()">🔄 다른 조건으로 다시 찾기</button>
    </div>
  </div>
</div>

const filterOptions = {
  spicy: { id:'f-spicy', label:'🌡️ 맵기', opts:['매운','순한','상관없음'] },
  type:  { id:'f-type',  label:'🥣 형태', opts:['국/찌개','볶음','튀김','찜','면','구이','기타','상관없음'] },
  cuisine: { id:'f-cuisine', label:'🌍 종류', opts:['한식','일식','중식','양식','기타','상관없음'] },
  taste: { id:'f-taste', label:'👅 맛',  opts:['매운','담백','느끼','달콤','짭짤','새콤','상관없음'] },
  amount:{ id:'f-amount',label:'⚖️ 양',  opts:['가벼움','보통','많음','상관없음'] },
};

let filterSelections = { spicy:'', type:'', cuisine:'', taste:'', amount:'' };

// 칩 렌더링
Object.keys(filterOptions).forEach(key => {
  const { id, opts } = filterOptions[key];
  const el = document.getElementById(id);
  opts.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = opt;
    chip.onclick = () => {
      el.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      filterSelections[key] = opt === '상관없음' ? '' : opt;
    };
    el.appendChild(chip);
  });
});

function switchMode(mode) {
  document.getElementById('random-mode').style.display = mode === 'random' ? 'block' : 'none';
  document.getElementById('filter-mode').style.display = mode === 'filter' ? 'block' : 'none';
  document.getElementById('tab-random').classList.toggle('active', mode === 'random');
  document.getElementById('tab-filter').classList.toggle('active', mode === 'filter');
}

function pickRandom() {
  const picks = [];
  const pool = [...menus];
  while (picks.length < 3 && pool.length > 0) {
    const idx = Math.floor(Math.random() * pool.length);
    picks.push(pool.splice(idx, 1)[0]);
  }
  const grid = document.getElementById('random-results');
  grid.innerHTML = picks.map(m => `
    <div class="random-result-item">
      <span class="rri-emoji">${m.emoji}</span>
      <div class="rri-name">${m.name}</div>
      <span class="rri-tag">${m.cuisine} · ${m.type}</span>
    </div>
  `).join('');
  grid.style.display = 'grid';
  document.getElementById('random-again-wrap').style.display = 'block';
  grid.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function filterMenu() {
  const { spicy, type, cuisine, taste, amount } = filterSelections;
  let results = menus.filter(m => {
    if (spicy && m.spicy !== spicy) return false;
    if (type && m.type !== type) return false;
    if (cuisine && m.cuisine !== cuisine) return false;
    if (taste && m.taste !== taste) return false;
    if (amount && m.amount !== amount) return false;
    return true;
  });
  // 섞어서 최대 6개
  results = results.sort(() => Math.random() - 0.5).slice(0, 6);

  const listEl = document.getElementById('filter-result-list');
  if (results.length === 0) {
    listEl.innerHTML = '<div class="no-result">😅 조건에 맞는 메뉴가 없어요!<br/>조건을 조금 바꿔서 다시 시도해봐요</div>';
  } else {
    listEl.innerHTML = results.map(m => `
      <div class="filter-result-item">
        <span class="fri-emoji">${m.emoji}</span>
        <div class="fri-body">
          <div class="fri-name">${m.name}</div>
          <div class="fri-info">
            <span class="fri-badge">${m.cuisine}</span>
            <span class="fri-badge">${m.type}</span>
            ${m.tags.map(t => `<span class="fri-badge">#${t}</span>`).join('')}
          </div>
        </div>
      </div>
    `).join('');
  }
  document.getElementById('filter-results').style.display = 'block';
  document.getElementById('filter-results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetFilter() {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  filterSelections = { spicy:'', type:'', cuisine:'', taste:'', amount:'' };
  document.getElementById('filter-results').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
