<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>마법의 고민 해결사 📖 핑고퀴즈</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet"/>
  <meta property="og:title" content="마법의 고민 해결사 📖"/>
  <meta property="og:description" content="신비로운 마법서가 당신의 고민에 답해드려요"/>
  <meta property="og:image" content="https://pingoquiz/og-image.png"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2274221145664784" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0e0b18;
      --bg2: #150f28;
      --card: #1a1430;
      --card2: #221838;
      --gold: #c8963c;
      --gold2: #e8c060;
      --purple: #8060c8;
      --purple2: #b090f0;
      --teal: #40b8a0;
      --text: #f0e8d8;
      --muted: #8070a0;
      --border: #2e2248;
      --radius: 16px;
      --shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0 0 60px; overflow-x: hidden;
    }
    /* 별 배경 */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(128,96,200,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(200,150,60,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(64,184,160,0.05) 0%, transparent 60%);
    }
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .star {
      position: absolute; width: 2px; height: 2px;
      background: white; border-radius: 50%;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

    .top-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--purple), var(--gold), var(--teal), var(--gold), var(--purple));
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

    .ad-slot {
      margin: 0 auto 24px; background: rgba(255,255,255,0.03);
      border: 1.5px dashed rgba(200,150,60,0.2);
      border-radius: 12px; padding: 14px;
      text-align: center; min-height: 90px;
      display: flex; align-items: center; justify-content: center;
    }
    .back-btn {
      display: block; text-align: left; color: var(--muted); font-size: 0.85rem;
      text-decoration: none; margin: 28px 0 20px; transition: color 0.15s;
    }
    .back-btn:hover { color: var(--gold); }

    /* 헤더 */
    .page-header { text-align: center; padding: 10px 0 36px; }
    .header-sparkles { font-size: 1.5rem; letter-spacing: 8px; margin-bottom: 10px; display: block; }
    h1 {
      font-family: 'Noto Serif KR', serif; font-size: clamp(1.5rem,5vw,2rem);
      color: var(--gold2); margin-bottom: 8px; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(200,150,60,0.4);
    }
    .page-sub { color: var(--muted); font-size: 0.88rem; line-height: 1.8; font-family: 'Noto Serif KR', serif; }

    /* ===== 마법서 ===== */
    .book-scene {
      display: flex; justify-content: center; align-items: center;
      margin: 10px 0 32px; min-height: 280px; perspective: 1000px;
    }
    .book-wrap {
      position: relative; cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.1s ease;
    }
    .book-wrap:hover { transform: scale(1.03); }
    .book-wrap:active { transform: scale(0.97); }

    /* 책 닫힌 상태 */
    .book-closed {
      width: 200px; height: 260px;
      background: linear-gradient(160deg, #2a1850, #1a1038, #0e0820);
      border-radius: 4px 16px 16px 4px;
      box-shadow:
        -8px 4px 20px rgba(0,0,0,0.8),
        inset -3px 0 8px rgba(255,255,255,0.05),
        0 0 40px rgba(128,96,200,0.2);
      border: 1px solid rgba(200,150,60,0.3);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; padding: 20px;
      position: relative; overflow: hidden;
      transition: all 0.6s ease;
    }
    /* 책등 */
    .book-closed::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 16px;
      background: linear-gradient(90deg, #0a0618, #1a1038);
      border-radius: 4px 0 0 4px;
      box-shadow: inset -2px 0 4px rgba(0,0,0,0.5);
    }
    /* 금빛 테두리 장식 */
    .book-closed::after {
      content: '';
      position: absolute; inset: 8px 8px 8px 20px;
      border: 1px solid rgba(200,150,60,0.2);
      border-radius: 2px 10px 10px 2px;
      pointer-events: none;
    }
    .book-symbol {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 12px rgba(200,150,60,0.6));
      animation: float-book 4s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes float-book { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .book-label {
      font-family: 'Noto Serif KR', serif; font-size: 0.82rem;
      color: var(--gold); letter-spacing: 2px; text-align: center;
      position: relative; z-index: 1;
      text-shadow: 0 0 8px rgba(200,150,60,0.5);
    }
    .book-click-hint {
      font-size: 0.72rem; color: var(--muted); text-align: center;
      position: relative; z-index: 1;
      animation: pulse-hint 2s ease-in-out infinite;
    }
    @keyframes pulse-hint { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* 책 열린 상태 */
    .book-open {
      display: none;
      width: 340px; height: 260px;
      position: relative;
    }
    .book-page-left, .book-page-right {
      position: absolute; top: 0; bottom: 0; width: calc(50% - 2px);
      background: linear-gradient(160deg, #f5ede0, #efe0cc);
      border: 1px solid #d0b890;
    }
    .book-page-left {
      left: 0; border-radius: 4px 0 0 4px;
      box-shadow: -4px 4px 20px rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      padding: 20px 14px;
    }
    .book-page-right {
      right: 0; border-radius: 0 4px 4px 0;
      box-shadow: 4px 4px 20px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 20px 14px; gap: 10px;
    }
    /* 책 중앙 바인딩 */
    .book-spine {
      position: absolute; left: 50%; top: 0; bottom: 0;
      width: 4px; background: linear-gradient(90deg, #c8a060, #e8c070, #c8a060);
      transform: translateX(-50%);
      box-shadow: 0 0 8px rgba(200,150,60,0.4);
    }
    .left-deco {
      font-size: 3rem; color: rgba(128,96,200,0.25);
      font-family: 'Noto Serif KR', serif; line-height: 1;
    }
    .answer-text {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.82rem; color: #4a2800;
      text-align: center; line-height: 1.9;
      white-space: pre-line;
    }
    .answer-author {
      font-size: 0.7rem; color: #8a6040;
      font-style: italic; text-align: right; width: 100%;
    }

    /* 책 펼치기 애니메이션 */
    @keyframes openLeft {
      from { transform: perspective(600px) rotateY(-90deg); opacity: 0; }
      to   { transform: perspective(600px) rotateY(0); opacity: 1; }
    }
    @keyframes openRight {
      from { transform: perspective(600px) rotateY(90deg); opacity: 0; }
      to   { transform: perspective(600px) rotateY(0); opacity: 1; }
    }
    .book-open.animating .book-page-left { animation: openLeft 0.6s ease both; }
    .book-open.animating .book-page-right { animation: openRight 0.6s ease 0.1s both; }

    /* 열린 책 아래 버튼 */
    .book-actions {
      display: none; flex-direction: column; align-items: center; gap: 10px; margin-top: 8px;
    }
    .again-btn {
      background: linear-gradient(135deg, var(--purple), var(--gold));
      color: white; border: none; border-radius: 99px;
      padding: 14px 40px; font-family: 'Jua', cursive; font-size: 1rem;
      cursor: pointer; box-shadow: 0 4px 20px rgba(128,96,200,0.3);
      transition: all 0.15s;
    }
    .again-btn:hover { transform: translateY(-2px); }
    .close-book-btn {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      border-radius: 99px; padding: 8px 24px; font-size: 0.85rem;
      cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif;
    }
    .close-book-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* 카테고리 칩 */
    .category-wrap {
      margin-bottom: 24px;
    }
    .category-title {
      font-family: 'Noto Serif KR', serif; font-size: 0.82rem;
      color: var(--gold); letter-spacing: 2px; margin-bottom: 10px; text-align: center;
    }
    .category-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .cat-chip {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 99px; padding: 7px 16px;
      font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .cat-chip:hover { border-color: var(--gold); color: var(--gold); }
    .cat-chip.active { background: rgba(200,150,60,0.15); border-color: var(--gold); color: var(--gold2); font-weight: 700; }

    /* 명언 미리보기 목록 */
    .wisdom-history {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-top: 24px;
      box-shadow: var(--shadow);
    }
    .wisdom-history-title {
      font-family: 'Noto Serif KR', serif; font-size: 0.88rem;
      color: var(--gold); margin-bottom: 14px; letter-spacing: 1px;
    }
    .wisdom-item {
      padding: 12px 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .wisdom-item:last-child { border-bottom: none; padding-bottom: 0; }
    .wisdom-item-icon { font-size: 1.2rem; min-width: 24px; }
    .wisdom-item-text {
      font-family: 'Noto Serif KR', serif; font-size: 0.85rem;
      color: #b0a080; line-height: 1.7; font-style: italic;
    }
    .wisdom-item-tag { font-size: 0.72rem; color: var(--muted); margin-top: 3px; display: block; }

  
    .rec-section { margin: 28px 0 8px; }
    .rec-label { text-align:center; font-size:0.72rem; letter-spacing:0.15em;
      color:var(--primary, #9b59f5); font-weight:700; margin-bottom:14px; }
    .rec-card { display:flex; align-items:center; gap:12px;
      background:var(--card, #fff); border:1.5px solid var(--border, #ede8ff);
      border-radius:14px; padding:14px 18px; margin-bottom:10px;
      text-decoration:none; color:inherit; transition:all 0.15s; }
    .rec-card:hover { border-color:var(--primary, #9b59f5); transform:translateX(4px); }
    .rec-emoji { font-size:1.6rem; flex-shrink:0; }
    .rec-title { flex:1; font-size:0.9rem; font-weight:700; color:var(--text, #1a1a2e); }
    .rec-arrow { font-size:0.9rem; color:var(--primary, #9b59f5); flex-shrink:0; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="top-bar"></div>
<div class="wrap">
  <a class="back-btn" href="/">← 핑고퀴즈 홈으로</a>

  <div class="ad-slot">
    <ins class="adsbygoogle" style="display:block"
      data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177"
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="page-header">
    <span class="header-sparkles">✦ ✧ ✦</span>
    <h1>마법의 고민 해결사</h1>
    <p class="page-sub">신비로운 마법서가 당신의 고민에<br/>오늘의 답을 건네드립니다</p>
  </div>

  <!-- 카테고리 -->
  <div class="category-wrap">
    <div class="category-title">✦ 어떤 고민인가요? ✦</div>
    <div class="category-chips">
      <div class="cat-chip active" data-cat="all" onclick="selectCat(this,'all')">🌟 아무거나</div>
      <div class="cat-chip" data-cat="love" onclick="selectCat(this,'love')">💕 연애/관계</div>
      <div class="cat-chip" data-cat="work" onclick="selectCat(this,'work')">💼 공부/취업</div>
      <div class="cat-chip" data-cat="choice" onclick="selectCat(this,'choice')">⚖️ 선택/결정</div>
      <div class="cat-chip" data-cat="mind" onclick="selectCat(this,'mind')">🧘 마음/감정</div>
      <div class="cat-chip" data-cat="future" onclick="selectCat(this,'future')">🔮 미래/불안</div>
    </div>
  </div>

  <!-- 마법서 -->
  <div class="book-scene">
    <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
      <!-- 닫힌 책 -->
      <div class="book-wrap" id="book-closed-wrap" onclick="openBook()">
        <div class="book-closed">
          <span class="book-symbol">📖</span>
          <div class="book-label">마법의 해결서</div>
          <div class="book-click-hint">✨ 책을 클릭하면 펼쳐져요</div>
        </div>
      </div>
      <!-- 열린 책 -->
      <div class="book-open" id="book-open">
        <div class="book-page-left">
          <div class="left-deco">"</div>
        </div>
        <div class="book-spine"></div>
        <div class="book-page-right">
          <div class="answer-text" id="answer-text"></div>
          <div class="answer-author" id="answer-author"></div>
        </div>
      </div>
      <!-- 버튼 -->
      <div class="book-actions" id="book-actions">
        <button class="again-btn" onclick="openBook()">✨ 다시 펼치기</button>
      <button class="close-book-btn" onclick="closeBook()">책 닫기</button>
      </div>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="wisdom-history" id="wisdom-history" style="display:none">
    <div class="wisdom-history-title">✦ 오늘 받은 말들</div>
    <div id="history-list"></div>
  </div>

  <div class="ad-slot" style="margin-top:24px;">
    <ins class="adsbygoogle" style="display:block"
      data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177"
      data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
</div>

<script>
// 별 만들기
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${0.2+Math.random()*0.8}`;
  starsEl.appendChild(s);
}

const wisdoms = {
  all: [
    { text: "지금 당장 답이 없어도 괜찮아요.\n시간이 모든 걸 정리해줄 거예요.", icon: "⏳", tag: "기다림" },
    { text: "한 걸음만 내디디면 돼요.\n그다음은 그다음에 생각해요.", icon: "👣", tag: "용기" },
    { text: "틀린 선택은 없어요.\n모든 선택은 경험이 돼요.", icon: "🌱", tag: "성장" },
    { text: "지금 힘든 건 열심히 살고 있다는 증거예요.", icon: "💪", tag: "위로" },
    { text: "완벽하게 준비된 순간은 오지 않아요.\n지금 시작하는 게 답이에요.", icon: "🚀", tag: "시작" },
    { text: "남의 시선보다 내 마음이 더 중요해요.", icon: "🪞", tag: "자기 자신" },
    { text: "쉬는 것도 하나의 선택이에요.\n지쳤을 땐 잠시 멈춰도 돼요.", icon: "☁️", tag: "휴식" },
    { text: "지금 이 순간도 언젠가\n\"그때 그랬었지\" 하고 웃게 될 거예요.", icon: "😊", tag: "시간" },
    { text: "모든 걸 혼자 해결하려 하지 말아요.\n도움을 받는 것도 용기예요.", icon: "🤝", tag: "용기" },
    { text: "잘 안 되는 건 아직 때가 아닌 거예요.\n강물도 굽어 흘러야 바다에 닿아요.", icon: "🌊", tag: "흐름" },
    { text: "두렵다면 두려운 채로 해봐요.\n용기는 두려움이 없는 게 아니에요.", icon: "🦋", tag: "도전" },
    { text: "지금 당신이 짊어진 건\n충분히 무거운 거예요. 잘 하고 있어요.", icon: "🌟", tag: "위로" },
    { text: "내가 나를 제일 먼저 응원해줘야 해요.", icon: "📣", tag: "자기 사랑" },
    { text: "오늘 최선을 다했다면\n그걸로 충분히 훌륭한 하루예요.", icon: "🌙", tag: "하루" },
    { text: "인생은 속도가 아니라 방향이 중요해요.", icon: "🧭", tag: "방향" },
    { text: "작은 것에 감사할수록\n삶이 더 풍요로워 보여요.", icon: "🍀", tag: "감사" },
    { text: "지금 이 고비가 지나고 나면\n오히려 그때가 전환점이었다는 걸 알게 될 거예요.", icon: "🌅", tag: "전환점" },
    { text: "남들은 생각보다 나에게\n관심이 없어요. 자유롭게 살아도 돼요.", icon: "🎈", tag: "자유" },
    { text: "지금 잘 못하고 있는 게 아니에요.\n그냥 아직 배우는 중인 거예요.", icon: "📖", tag: "성장" },
    { text: "나쁜 날도 지나가요.\n좋은 날도 지나가요. 그냥 흘러가봐요.", icon: "🌤️", tag: "흘러가기" },
  ],
  love: [
    { text: "좋아하는 마음을 숨기느라\n더 많은 에너지가 쓰여요. 그냥 말해봐요.", icon: "💬", tag: "고백" },
    { text: "억지로 잡은 인연보다\n자연스럽게 남은 인연이 진짜예요.", icon: "🌿", tag: "인연" },
    { text: "나를 편하게 해주는 사람이\n나에게 맞는 사람이에요.", icon: "☕", tag: "편안함" },
    { text: "상대를 바꾸려 하지 말고\n내가 원하는 게 뭔지를 먼저 알아봐요.", icon: "🔍", tag: "관계" },
    { text: "혼자일 때 행복한 사람이\n둘이 되어도 행복해요.", icon: "🌻", tag: "혼자" },
    { text: "말하지 않으면 상대는 몰라요.\n마음은 전해야 전해지는 거예요.", icon: "💌", tag: "소통" },
    { text: "연락이 뜸해졌다면\n두 사람 다 잠시 숨을 고르는 거일 수도 있어요.", icon: "🌙", tag: "기다림" },

let selectedCat = 'all';
let history = [];

function selectCat(el, cat) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedCat = cat;
  closeBook();
}

function getWisdom() {
  const pool = selectedCat === 'all'
    ? Object.values(wisdoms).flat()
    : [...wisdoms.all, ...(wisdoms[selectedCat] || [])];
  return pool[Math.floor(Math.random() * pool.length)];
}

function openBook() {
  const w = getWisdom();
  const closedWrap = document.getElementById('book-closed-wrap');
  const openEl = document.getElementById('book-open');
  const actionsEl = document.getElementById('book-actions');

  // 닫힌 책 숨기고 열린 책 표시
  closedWrap.style.display = 'none';
  openEl.style.display = 'block';
  openEl.classList.add('animating');
  actionsEl.style.display = 'flex';

  document.getElementById('answer-text').textContent = w.text;
  document.getElementById('answer-author').textContent = '— ' + w.tag;

  setTimeout(() => openEl.classList.remove('animating'), 800);

  // 히스토리
  history.unshift(w);
  if (history.length > 5) history.pop();
  renderHistory();
}

function closeBook() {
  document.getElementById('book-closed-wrap').style.display = 'flex';
  document.getElementById('book-open').style.display = 'none';
  document.getElementById('book-actions').style.display = 'none';
}

function renderHistory() {
  if (history.length === 0) return;
  const histEl = document.getElementById('wisdom-history');
  const listEl = document.getElementById('history-list');
  histEl.style.display = 'block';
  listEl.innerHTML = history.map(w => `
    <div class="wisdom-item">
      <span class="wisdom-item-icon">${w.icon}</span>
      <div>
        <div class="wisdom-item-text">${w.text.replace(/\n/g,'<br/>')}</div>
        <span class="wisdom-item-tag">— ${w.tag}</span>
      </div>
    </div>
  `).join('');
}
