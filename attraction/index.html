<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나는 어떤 사람에게 끌릴까? 🧲 끌림의 법칙</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2274221145664784" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #fff8f0;
      --card: #ffffff;
      --primary: #ff7043;
      --secondary: #ff9a6c;
      --gold: #ffb300;
      --text: #2d1a0e;
      --muted: #a0856e;
      --border: #ffe0cc;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
    body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 70% 10%, rgba(255,154,108,0.2) 0%, transparent 50%); pointer-events:none; }
    .back-btn { display:inline-block; margin:20px 20px 0; color:var(--muted); font-size:0.85rem; text-decoration:none; position:relative; z-index:1; }
    .back-btn:hover { color:var(--primary); }
    .container { max-width:520px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }
    .intro-screen { text-align:center; padding-top:40px; }
    .hero-emoji { font-size:5rem; display:block; margin-bottom:16px; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    h1 { font-family:'Jua',cursive; font-size:1.8rem; color:var(--primary); margin-bottom:10px; line-height:1.3; }
    .intro-desc { color:var(--muted); font-size:0.9rem; line-height:1.7; margin-bottom:32px; }
    .start-btn { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; border:none; border-radius:99px; padding:16px 48px; font-family:'Jua',cursive; font-size:1.1rem; cursor:pointer; box-shadow:0 4px 20px rgba(255,112,67,0.35); transition:transform 0.15s; }
    .start-btn:hover { transform:scale(1.04); }
    .quiz-screen { display:none; padding-top:30px; }
    .progress-wrap { height:4px; background:var(--border); border-radius:99px; margin-bottom:24px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),var(--gold)); border-radius:99px; transition:width 0.3s; }
    .q-num { font-size:0.78rem; color:var(--muted); margin-bottom:10px; }
    .q-text { font-family:'Jua',cursive; font-size:1.15rem; color:var(--text); margin-bottom:24px; line-height:1.5; }
    .options { display:flex; flex-direction:column; gap:12px; }
    .opt-btn { background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:16px 18px; text-align:left; color:var(--text); font-size:0.9rem; cursor:pointer; transition:all 0.15s; line-height:1.5; box-shadow:0 2px 8px rgba(255,112,67,0.06); }
    .opt-btn:hover { border-color:var(--primary); background:rgba(255,112,67,0.05); }
    .result-screen { display:none; padding-top:30px; }
    .result-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:32px 24px; box-shadow:0 4px 24px rgba(255,112,67,0.08); }
    .res-emoji { font-size:4rem; text-align:center; display:block; margin-bottom:12px; }
    .res-label { font-size:0.75rem; color:var(--primary); letter-spacing:0.15em; text-align:center; margin-bottom:6px; }
    .res-name { font-family:'Jua',cursive; font-size:1.6rem; color:var(--text); text-align:center; margin-bottom:4px; }
    .res-sub { font-size:0.85rem; color:var(--muted); text-align:center; margin-bottom:16px; }
    .res-tag { display:block; width:fit-content; margin:0 auto 20px; background:rgba(255,112,67,0.1); color:var(--primary); border:1px solid rgba(255,112,67,0.3); border-radius:99px; padding:4px 14px; font-size:0.8rem; }
    .section-title { font-family:'Jua',cursive; font-size:0.95rem; color:var(--gold); margin:20px 0 8px; }
    .res-desc { font-size:0.88rem; color:var(--muted); line-height:1.8; }
    .trait-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .trait-tag { background:rgba(255,112,67,0.08); color:var(--primary); border:1px solid rgba(255,112,67,0.2); border-radius:99px; padding:4px 12px; font-size:0.78rem; }
    .match-box { background:#fff5f0; border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:8px; }
    .match-box p { font-size:0.85rem; color:var(--text); line-height:1.7; }
    .ad-slot { margin:24px 0; }
    .share-btn { width:100%; background:rgba(255,112,67,0.08); color:var(--primary); border:1.5px solid rgba(255,112,67,0.25); border-radius:99px; padding:14px; font-family:'Jua',cursive; font-size:0.95rem; cursor:pointer; transition:all 0.15s; margin-bottom:10px; }
    .share-btn:hover { background:rgba(255,112,67,0.15); }
    .retry-btn { width:100%; background:transparent; color:var(--muted); border:1.5px solid var(--border); border-radius:99px; padding:12px; font-family:'Jua',cursive; font-size:0.9rem; cursor:pointer; }
    .share-card-wrap { margin:24px 0 0; background:linear-gradient(135deg,rgba(255,112,67,0.1),rgba(255,112,67,0.03)); border:1.5px solid rgba(255,112,67,0.25); border-radius:20px; padding:28px 24px 20px; text-align:center; }
    #sc-emoji { font-size:2.8rem; margin-bottom:8px; }
    #sc-title { font-family:'Jua',cursive; font-size:1.3rem; margin-bottom:4px; }
    #sc-sub { font-size:0.82rem; color:var(--muted); margin-bottom:10px; }
    #sc-tag { display:inline-block; background:rgba(255,112,67,0.1); color:var(--primary); border:1px solid rgba(255,112,67,0.25); border-radius:99px; padding:4px 14px; font-size:0.78rem; }
    .brand-txt { font-size:0.62rem; color:rgba(150,150,150,0.4); letter-spacing:0.1em; margin-top:10px; }
    .hint-txt { font-size:0.65rem; color:#bbb; margin-top:8px; }
    .sc-label { font-size:0.72rem; color:var(--primary); letter-spacing:0.15em; margin-bottom:12px; font-weight:700; }
  
    /* 추천 테스트 */
    .rec-section { margin: 28px 0 8px; }
    .rec-label { text-align:center; font-size:0.72rem; letter-spacing:0.15em;
      color:var(--primary, #9b59f5); font-weight:700; margin-bottom:14px; }
    .rec-card { display:flex; align-items:center; gap:12px;
      background:var(--card, #fff); border:1.5px solid var(--border, #ede8ff);
      border-radius:14px; padding:14px 18px; margin-bottom:10px;
      text-decoration:none; color:inherit; transition:all 0.15s; }
    .rec-card:hover { border-color:var(--primary, #9b59f5);
      transform:translateX(4px); }
    .rec-emoji { font-size:1.6rem; flex-shrink:0; }
    .rec-title { flex:1; font-size:0.9rem; font-weight:700;
      color:var(--text, #1a1a2e); }
    .rec-arrow { font-size:0.9rem; color:var(--primary, #9b59f5); flex-shrink:0; }

  </style>
</head>
<body>
<a class="back-btn" href="/">← 핑고퀴즈 홈으로</a>
<div class="container">
  <div class="intro-screen" id="intro-screen">
    <span class="hero-emoji">🧲</span>
    <h1>나는 어떤 사람에게<br/>끌릴까?</h1>
    <p class="intro-desc">당신의 끌림에는 법칙이 있어요.<br/>8문항으로 당신의 이상형 패턴을 분석해드려요.</p>
    <div class="ad-slot">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <button class="start-btn" onclick="startTest()">🔍 끌림의 법칙 알아보기</button>
  </div>
  <div class="quiz-screen" id="quiz-screen">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <div class="q-num" id="q-num">1 / 8</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="result-screen" id="result-screen">
    <div class="result-card">
      <span class="res-emoji" id="res-emoji"></span>
      <div class="res-label" id="res-label"></div>
      <div class="res-name" id="res-name"></div>
      <div class="res-sub" id="res-sub"></div>
      <div class="res-tag" id="res-tag"></div>
      <div class="section-title">🧲 끌리는 이유</div>
      <div class="res-desc" id="res-desc"></div>
      <div class="section-title">✨ 이상형 키워드</div>
      <div class="trait-row" id="res-traits"></div>
      <div class="section-title">💡 주의할 점</div>
      <div class="match-box"><p id="res-warning"></p></div>
    </div>
    <div class="ad-slot">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2274221145664784" data-ad-slot="7164108177" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    <div class="share-card-wrap">
      <div class="sc-label">✦ 결과 공유 카드 ✦</div>
      <div id="sc-emoji"></div>
      <div id="sc-title"></div>
      <div id="sc-sub"></div>
      <div id="sc-tag"></div>
      <div class="hint-txt">📱 화면을 캡처해서 친구에게 공유해봐요!</div>
      <div class="brand-txt">pingoquiz</div>
    </div>
    <button class="share-btn" onclick="copyLink(this)">🔗 링크 복사해서 공유하기</button>
    <button class="retry-btn" onclick="restartTest()">🔄 다시 테스트하기</button>
<div class="rec-section">
  <div class="rec-label">✦ 비슷한 테스트 추천 ✦</div>
    <a class="rec-card" href="/couple">
      <span class="rec-emoji">💘</span>
      <span class="rec-title">우리 MBTI 궁합</span>
      <span class="rec-arrow">→</span>
    </a>
    <a class="rec-card" href="/bearfox">
      <span class="rec-emoji">🐻</span>
      <span class="rec-title">곰 타입? 여우 타입?</span>
      <span class="rec-arrow">→</span>
    </a>
    <a class="rec-card" href="/crush">
      <span class="rec-emoji">💘</span>
      <span class="rec-title">썸남·썸녀 공략법</span>
      <span class="rec-arrow">→</span>
    </a>
    <a class="rec-card" href="/crush-signal">
      <span class="rec-emoji">💭</span>
      <span class="rec-title">헷갈리는 상대 분석기</span>
      <span class="rec-arrow">→</span>
    </a>
</div>

  </div>
</div>
<script>
const questions = [
  { text:"🌟 처음 만난 사람에게 끌릴 때, 그 이유는?", options:[
    {text:"분위기가 독특하고 뭔가 신비로워서",axis:0},
    {text:"사람들을 잘 이끌고 카리스마 있어서",axis:1},
    {text:"따뜻하고 말을 잘 들어줘서",axis:2},
    {text:"재미있고 같이 있으면 즐거워서",axis:3}
  ]},
  { text:"🎬 내가 좋아하는 드라마/영화 주인공 스타일은?", options:[
    {text:"말 없지만 내면이 깊은 캐릭터",axis:0},
    {text:"목표를 향해 거침없이 달리는 캐릭터",axis:1},
    {text:"주변을 따뜻하게 감싸는 캐릭터",axis:2},
    {text:"어디서든 웃음을 주는 밝은 캐릭터",axis:3}
  ]},
  { text:"💭 이상형을 한 단어로 표현하면?", options:[
    {text:"미스터리한",axis:0},
    {text:"멋있는",axis:1},
    {text:"다정한",axis:2},
    {text:"재미있는",axis:3}
  ]},
  { text:"🕐 연인과 첫 데이트, 어떤 사람이 두근거려?", options:[
    {text:"별로 말이 없는데 눈빛이 깊은 사람",axis:0},
    {text:"데이트 코스를 완벽하게 준비한 사람",axis:1},
    {text:"내 얘기를 진지하게 들어주는 사람",axis:2},
    {text:"어색함 없이 웃기게 분위기 띄우는 사람",axis:3}
  ]},
  { text:"📱 연인에게 기대하는 연락 스타일은?", options:[
    {text:"많지 않지만 깊이 있는 대화",axis:0},
    {text:"바쁜데도 챙겨주는 연락",axis:1},
    {text:"일상을 공유하는 따뜻한 메시지",axis:2},
    {text:"재밌는 밈이나 영상 공유",axis:3}
  ]},
  { text:"🏕️ 이상적인 주말 데이트는?", options:[
    {text:"조용한 카페나 미술관",axis:0},
    {text:"새로운 레스토랑이나 특별한 장소",axis:1},
    {text:"집에서 같이 요리하거나 산책",axis:2},
    {text:"놀이공원이나 게임",axis:3}
  ]},
  { text:"💔 전 연인을 떠올렸을 때 가장 생각나는 모습은?", options:[
    {text:"혼자 뭔가 생각하던 조용한 모습",axis:0},
    {text:"뭔가를 성취했을 때 자신있는 모습",axis:1},
    {text:"나를 따뜻하게 챙겨주던 모습",axis:2},
    {text:"같이 웃고 떠들던 모습",axis:3}
  ]},
  { text:"🌹 상대방에게 반하는 결정적인 순간은?", options:[
    {text:"남들과 다른 생각을 얘기할 때",axis:0},
    {text:"어려운 상황에서 침착하게 이끌 때",axis:1},
    {text:"상처받은 날 먼저 알아채줄 때",axis:2},
    {text:"진심으로 크게 웃을 때",axis:3}
  ]}
];

const results = {
  0: { emoji:"🌑", label:"MYSTERY TYPE", name:"미스터리한 사람에게 끌려요", sub:"알 수 없을수록 더 빠져드는 타입", tag:"신비로운 사람에게 약함", desc:"말이 없고 어딘가 알 수 없는 사람에게 끌려요. 쉽게 파악되지 않는 사람일수록 더 궁금하고 빠져들어요. 겉과 속이 다른 사람, 내면에 깊이가 있는 사람에게 자연스럽게 매력을 느껴요.", traits:["신비로운","내면 깊은","독특한 분위기","과묵함"], warning:"관계가 깊어져도 마음을 잘 열지 않는 사람에게 상처받을 수 있어요. 소통을 중요시하는 것도 필요해요." },
  1: { emoji:"⚡", label:"CHARISMA TYPE", name:"카리스마 있는 사람에게 끌려요", sub:"강하고 멋진 사람이 좋아", tag:"카리스마에 약함", desc:"자신감 있고 이끌어가는 사람에게 끌려요. 어떤 상황에서도 흔들리지 않고 목표를 향해 나아가는 모습, 사람들을 이끄는 리더십에서 매력을 느껴요.", traits:["카리스마","자신감","리더십","성취형"], warning:"강한 사람에게 끌리다 보면 나 자신이 소홀해지는 경우가 있어요. 서로 대등한 관계인지 확인해보세요." },
  2: { emoji:"🌷", label:"WARMTH TYPE", name:"다정한 사람에게 끌려요", sub:"따뜻하게 챙겨주는 사람이 좋아", tag:"따뜻함에 약함", desc:"말 한마디, 행동 하나에서 진심으로 배려하는 사람에게 끌려요. 화려하지 않아도 내 곁에서 따뜻하게 챙겨주는 사람, 아픈 마음을 먼저 알아채주는 사람이 이상형이에요.", traits:["다정함","배려심","공감 능력","따뜻함"], warning:"너무 다정한 사람에게 끌리다 보면 과도하게 의존하거나 감정적 피로가 생길 수 있어요." },
  3: { emoji:"☀️", label:"JOY TYPE", name:"밝고 재미있는 사람에게 끌려요", sub:"같이 있으면 즐거운 사람이 좋아", tag:"유쾌함에 약함", desc:"같이 있을 때 웃음이 끊이지 않는 사람에게 끌려요. 어색한 분위기도 풀어주고, 평범한 일상도 특별하게 만들어주는 밝은 에너지의 사람이 이상형이에요.", traits:["유쾌함","긍정적","활발함","웃음"], warning:"항상 밝고 재미있는 면만 보다가 상대방의 진지한 감정을 놓치지 않도록 주의해요." }
};

let scores=[0,0,0,0], current=0;
function startTest(){ document.getElementById('intro-screen').style.display='none'; document.getElementById('quiz-screen').style.display='block'; showQuestion(); }
function showQuestion(){
  const q=questions[current];
  document.getElementById('q-num').textContent=`${current+1} / ${questions.length}`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('progress-bar').style.width=`${(current/questions.length)*100}%`;
  const opts=document.getElementById('options'); opts.innerHTML='';
  q.options.forEach(o=>{ const btn=document.createElement('button'); btn.className='opt-btn'; btn.textContent=o.text; btn.onclick=()=>{ scores[o.axis]++; current++; current<questions.length?showQuestion():showResult(); }; opts.appendChild(btn); });
}
function showResult(fromUrl){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const top=scores.indexOf(Math.max(...scores)), r=results[top];
  document.getElementById('res-emoji').textContent=r.emoji;
  document.getElementById('res-label').textContent=r.label;
  document.getElementById('res-name').textContent=r.name;
  document.getElementById('res-sub').textContent=r.sub;
  document.getElementById('res-tag').textContent=r.tag;
  document.getElementById('res-desc').textContent=r.desc;
  document.getElementById('res-traits').innerHTML=r.traits.map(t=>`<span class="trait-tag">${t}</span>`).join('');
  document.getElementById('res-warning').textContent=r.warning;
  document.getElementById('sc-emoji').textContent=r.emoji;
  document.getElementById('sc-title').textContent=r.name;
  document.getElementById('sc-sub').textContent=r.sub;
  document.getElementById('sc-tag').textContent=r.tag;
  if(!fromUrl) history.replaceState(null,'','?r='+top);
  window.scrollTo({top:0,behavior:'smooth'});
}
function copyLink(btn){ const url=location.origin+location.pathname+location.search; navigator.clipboard.writeText(url).then(()=>{ btn.textContent='✅ 링크 복사 완료!'; setTimeout(()=>btn.textContent='🔗 링크 복사해서 공유하기',2000); }); }
function restartTest(){ scores=[0,0,0,0]; current=0; document.getElementById('result-screen').style.display='none'; document.getElementById('intro-screen').style.display='block'; window.scrollTo({top:0,behavior:'smooth'}); }
(function(){ const p=new URLSearchParams(location.search),r=p.get('r'); if(r!==null&&results[parseInt(r)]){ scores[parseInt(r)]=1; document.getElementById('intro-screen').style.display='none'; showResult(true); } })();
</script>
</body>
</html>
