  <style>
    :root {
      --bg: #fff8f0;
      --card: #ffffff;
      --primary: #ff6b35;
      --secondary: #ffd166;
      --accent: #06d6a0;
      --dark: #2d2d2d;
      --muted: #888;
      --radius: 20px;
      --shadow: 0 8px 32px rgba(255,107,53,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image:
        radial-gradient(circle at 10% 20%, #ffe0cc44 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, #ffd16633 0%, transparent 50%);
    }

    h1 {
      font-family: 'Jua', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--primary);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      width: 100%;
      max-width: 560px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .progress-bar-wrap {
      background: #f0e8e0;
      border-radius: 99px;
      height: 8px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
    }

    .q-num {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .q-text {
      font-family: 'Jua', cursive;
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      color: var(--dark);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #fff5ef;
      border: 2.5px solid #f0e0d0;
      border-radius: 14px;
      padding: 16px 20px;
      text-align: left;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1rem;
      color: var(--dark);
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover {
      background: #fff0e4;
      border-color: var(--primary);
      transform: translateX(6px);
      box-shadow: 0 4px 16px rgba(255,107,53,0.12);
    }

    .option-btn .emoji {
      font-size: 1.5rem;
      min-width: 36px;
      text-align: center;
    }

    /* Start screen */
    #start-screen {
      text-align: center;
    }

    .start-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: bounce 1.6s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .start-desc {
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.8;
      font-size: 0.97rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #ff9b5e);
      color: white;
      border: none;
      border-radius: 99px;
      padding: 16px 48px;
      font-family: 'Jua', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,107,53,0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 1px;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(255,107,53,0.38);
    }

    /* Result screen */
    #result-screen { text-align: center; display: none; }

    .result-food-emoji {
      font-size: 6rem;
      display: block;
      margin-bottom: 16px;
      animation: pop 0.5s cubic-bezier(.36,1.6,.4,1);
    }

    @keyframes pop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .result-type {
      font-family: 'Jua', cursive;
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .result-tag {
      display: inline-block;
      background: var(--secondary);
      color: #7a5c00;
      border-radius: 99px;
      padding: 4px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .result-desc {
      color: #555;
      line-height: 1.8;
      font-size: 0.97rem;
      margin-bottom: 28px;
      text-align: left;
      background: #fff8f0;
      border-radius: 14px;
      padding: 18px 20px;
    }

    .result-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .trait {
      background: #f0faf7;
      color: #04a07a;
      border: 1.5px solid #b5ead9;
      border-radius: 99px;
      padding: 5px 15px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .compatible {
      background: #fff5ef;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 28px;
    }

    .compatible strong { color: var(--primary); }

    .retry-btn {
      background: #f5f5f5;
      color: #555;
      border: 2px solid #e0e0e0;
      border-radius: 99px;
      padding: 13px 36px;
      font-family: 'Jua', cursive;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .retry-btn:hover {
      background: #fff0e4;
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 카카오 공유 버튼 */
    .share-section {
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .share-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .kakao-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FEE500;
      color: #3C1E1E;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 3px 12px rgba(254,229,0,0.4);
    }

    .kakao-btn:hover {
      background: #F5D800;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(254,229,0,0.5);
    }

    .kakao-btn svg {
      width: 20px;
      height: 20px;
    }

    /* 광고 자리 */
    .ad-slot {
      width: 100%;
      max-width: 560px;
      margin: 16px 0;
      background: #f9f9f9;
      border: 2px dashed #ddd;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      color: #bbb;
      font-size: 0.82rem;
    }

    .ad-slot-top {
      margin-bottom: 0;
    }

    /* hidden utility */
    .hidden { display: none !important; }
  
    /* 추천 테스트 */
    .rec-section { margin: 28px 0 8px; }
    .rec-label { text-align:center; font-size:0.72rem; letter-spacing:0.15em;
      color:var(--primary, #9b59f5); font-weight:700; margin-bottom:14px; }
    .rec-card { display:flex; align-items:center; gap:12px;
      background:var(--card, #fff); border:1.5px solid var(--border, #ede8ff);
      border-radius:14px; padding:14px 18px; margin-bottom:10px;
      text-decoration:none; color:inherit; transition:all 0.15s; }
    .rec-card:hover { border-color:var(--primary, #9b59f5);
      transform:translateX(4px); }
    .rec-emoji { font-size:1.6rem; flex-shrink:0; }
    .rec-title { flex:1; font-size:0.9rem; font-weight:700;
      color:var(--text, #1a1a2e); }
    .rec-arrow { font-size:0.9rem; color:var(--primary, #9b59f5); flex-shrink:0; }

  </style>
</head>

<script>
  function copyLink(btn) {
    const url = window.location.origin + window.location.pathname + window.location.search;
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✅ 링크 복사 완료!';
      setTimeout(() => { btn.textContent = '🔗 링크 복사하기'; }, 2000);
    });
  }

  // E/I, S/N, T/F, J/P 점수 누적
  // 각 질문의 답변은 4가지 축 중 하나에 +1 점을 줍니다
  // 축: E(0) vs I(1), S(2) vs N(3), T(4) vs F(5), J(6) vs P(7)

  const questions = [
    {
      text: "🎉 주말에 친구들과 모임이 생겼어요! 나는...",
      options: [
        { text: "신나게 참여! 사람들이랑 있으면 에너지가 충전돼", emoji: "🥳", axis: 0 },
        { text: "솔직히 집에서 혼자 쉬고 싶은데... 가야 하나 고민", emoji: "😌", axis: 1 }
      ]
    },
    {
      text: "🍽️ 새로운 식당을 고를 때 나는...",
      options: [
        { text: "리뷰, 별점, 메뉴 다 꼼꼼히 보고 결정해", emoji: "📱", axis: 2 },
        { text: "그냥 느낌 좋아 보이면 들어가! 직감을 믿어", emoji: "✨", axis: 3 }
      ]
    },
    {
      text: "🤔 친구가 실연을 당했을 때 나는...",
      options: [
        { text: "\"왜 헤어졌어? 어떻게 해결할 수 있을까\" 원인 분석부터", emoji: "🧠", axis: 4 },
        { text: "\"많이 힘들겠다ㅠㅠ\" 일단 마음을 공감해줘", emoji: "🫂", axis: 5 }
      ]
    },
    {
      text: "📅 내 하루 일정은...",
      options: [
        { text: "미리 계획 짜두고 그대로 움직이는 게 좋아", emoji: "🗓️", axis: 6 },
        { text: "그날그날 기분 따라! 즉흥이 제맛", emoji: "🎲", axis: 7 }
      ]
    },
    {
      text: "🍕 피자를 먹을 때 나는...",
      options: [
        { text: "사람들이랑 크게 시켜서 나눠 먹는 게 좋아", emoji: "👥", axis: 0 },
        { text: "내 취향대로 혼자 먹는 게 훨씬 좋아", emoji: "🙋", axis: 1 }
      ]
    },
    {
      text: "🌶️ 음식 맛을 표현할 때 나는...",
      options: [
        { text: "\"이거 진짜 맛있다! 육수가 깊고 면발이 탱탱해\" 구체적으로", emoji: "📝", axis: 2 },
        { text: "\"뭔가... 따뜻한 느낌? 기분이 좋아지는 맛이야\" 감성적으로", emoji: "🌈", axis: 3 }
      ]
    },
    {
      text: "🍣 맛집 줄을 1시간 기다릴 때 나는...",
      options: [
        { text: "\"이 시간에 다른 걸 할 수 있었는데...\" 비효율이 싫어", emoji: "⏱️", axis: 4 },
        { text: "\"기다리는 것도 설레잖아\" 과정도 즐거워", emoji: "😊", axis: 5 }
      ]
    },
    {
      text: "🛒 마트에서 장을 볼 때 나는...",
      options: [
        { text: "살 것 미리 리스트 만들어 가서 딱 그것만 사", emoji: "✅", axis: 6 },
        { text: "가서 눈에 보이는 거 사다 보면 카트가 가득", emoji: "🛍️", axis: 7 }
      ]
    },
    {
      text: "🎤 단체 모임에서 나는...",
      options: [
        { text: "분위기 메이커! 대화 주도하고 분위기 이끄는 편", emoji: "🎉", axis: 0 },
        { text: "조용히 들으면서 분위기 파악하는 편", emoji: "👂", axis: 1 }
      ]
    },
    {
      text: "🍜 라면 먹을 때 스프 양은...",
      options: [
        { text: "정해진 양 그대로! 레시피가 있는 건 이유가 있어", emoji: "📏", axis: 2 },
        { text: "조금 넣어봤다가 더 넣어봤다가... 그때그때 달라요", emoji: "🎨", axis: 3 }
      ]
    },
    {
      text: "🍰 음식 선택에서 나는...",
      options: [
        { text: "칼로리, 영양, 가격 따져서 합리적으로 선택해", emoji: "⚖️", axis: 4 },
        { text: "먹고 싶으면 그냥 먹어! 행복이 먼저야", emoji: "💛", axis: 5 }
      ]
    },
    {
      text: "🍽️ 오늘 저녁 뭐 먹을지 정할 때 나는...",
      options: [
        { text: "아침부터 이미 오늘 저녁 메뉴 결정해뒀어", emoji: "🗂️", axis: 6 },
        { text: "배고파질 때쯤 생각해보는 거지 뭐", emoji: "🤷", axis: 7 }
      ]
    }

  let scores = [0, 0, 0, 0, 0, 0, 0, 0]; // E,I,S,N,T,F,J,P
  let currentQ = 0;

  function startTest() {
    scores = [0, 0, 0, 0, 0, 0, 0, 0];
    currentQ = 0;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
  }

  function showQuestion() {
    const q = questions[currentQ];
    const total = questions.length;
    const pct = (currentQ / total) * 100;

    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('q-num').textContent = `질문 ${currentQ + 1} / ${total}`;
    document.getElementById('q-text').textContent = q.text;

    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="emoji">${opt.emoji}</span><span>${opt.text}</span>`;
      btn.onclick = () => selectAnswer(opt.axis);
      optDiv.appendChild(btn);
    });

    // Animate
    const card = document.getElementById('quiz-screen');
    card.style.animation = 'none';
    card.offsetHeight;
    card.style.animation = 'fadeUp 0.35s ease';
  }

  function selectAnswer(axis) {
    scores[axis]++;
    currentQ++;
    if (currentQ >= questions.length) {
      showResult();
    } else {
      showQuestion();
    }
  }

  function getMBTI() {
    const e = scores[0] >= scores[1] ? 'E' : 'I';
    const s = scores[2] >= scores[3] ? 'S' : 'N';
    const t = scores[4] >= scores[5] ? 'T' : 'F';
    const j = scores[6] >= scores[7] ? 'J' : 'P';
    return e + s + t + j;
  }

  function showResult() {
    document.getElementById('quiz-screen').classList.add('hidden');
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';

    const mbti = getMBTI();
    const r = results[mbti];

    document.getElementById('result-emoji').textContent = r.emoji;
    document.getElementById('result-type').textContent = r.name;
    document.getElementById('result-tag').textContent = `#${r.tag}`;
    document.getElementById('result-desc').textContent = r.desc;

    const traitsDiv = document.getElementById('result-traits');
    traitsDiv.innerHTML = r.traits.map(t => `<span class="trait">${t}</span>`).join('');

    document.getElementById('result-compat').innerHTML = `<strong>💕 나와 잘 맞는 음식 유형?</strong><br/>${r.compat}`;

    // 공유 카드 업데이트
    document.getElementById('sc-emoji').textContent = r.emoji;
    document.getElementById('sc-title').textContent = r.name;
    document.getElementById('sc-sub').textContent = '#' + r.tag;
    document.getElementById('sc-tag').textContent = 'MBTI 음식 유형 테스트';

    // URL 업데이트
    history.replaceState(null, '', '?r=' + mbti);

    rs.style.animation = 'none';
    rs.offsetHeight;
    rs.style.animation = 'fadeUp 0.4s ease';
  }

  function restartTest() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('start-screen').style.animation = 'none';
    document.getElementById('start-screen').offsetHeight;
    document.getElementById('start-screen').style.animation = 'fadeUp 0.4s ease';
  }

  // URL 파라미터로 결과 바로 표시
  (function() {
    const p = new URLSearchParams(window.location.search);
    const r = p.get('r');
    if (r && r.length === 4) {
      // MBTI 문자열로 점수 복원
      const axes = ['EI','SN','TF','JP'];
      axes.forEach((ax, i) => {
        const ch = r[i];
        const idx = i * 2 + (ax.indexOf(ch) >= 0 ? ax.indexOf(ch) : 0);
        if (typeof scores !== 'undefined') scores[idx] = 5;
      });
      document.getElementById('result-screen').style.display = 'block';
      document.getElementById('intro-screen') && (document.getElementById('intro-screen').style.display = 'none');
      showResult();
    }
  })();
