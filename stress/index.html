let scores = [0,0,0,0,0,0];
let current = 0;

function startTest(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  showQ();
}
function showQ(){
  const q = QUESTIONS[current];
  document.getElementById('q-num').textContent = (current+1) + ' / ' + QUESTIONS.length;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-bar').style.width = ((current/QUESTIONS.length)*100)+'%';
  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach(o=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o.text;
    btn.onclick = ()=>{
      o.scores.forEach((v,i)=>{ scores[i]+=v; });
      current++;
      if(current < QUESTIONS.length) showQ(); else showResult(false);
    };
    opts.appendChild(btn);
  });
}
function showResult(fromUrl){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const top = scores.indexOf(Math.max(...scores));
  const r = RESULTS[top];
  document.getElementById('res-emoji').textContent = r.emoji;
  document.getElementById('res-type').textContent = r.type;
  document.getElementById('res-name').textContent = r.name;
  document.getElementById('res-sub').textContent = r.sub;
  document.getElementById('res-desc').textContent = r.desc;
  document.getElementById('rec-list').innerHTML = r.recs.map(rc=>
    `<div class="rec-item">
      <span class="rec-item-emoji">${rc.emoji}</span>
      <div class="rec-item-body">
        <div class="rec-item-name">${rc.name}</div>
        <div class="rec-item-reason">${rc.reason}</div>
      </div>
    </div>`
  ).join('');
  document.getElementById('sc-emoji').textContent = r.emoji;
  document.getElementById('sc-title').textContent = r.name;
  document.getElementById('sc-sub').textContent = r.sub;
  document.getElementById('sc-recs').textContent = r.recs.slice(0,3).map(rc=>rc.emoji+' '+rc.name).join('  ·  ');
  if(!fromUrl){ try{ history.replaceState(null,'','?r='+top); }catch(e){} }
  window.scrollTo({top:0,behavior:'smooth'});
}
function copyLink(btn){
  const url = location.origin+location.pathname+location.search;
  navigator.clipboard.writeText(url).then(()=>{
    btn.textContent='✅ 링크 복사 완료!';
    setTimeout(()=>btn.textContent='🔗 링크 복사해서 공유하기',2000);
  });
}
function restartTest(){
  scores=[0,0,0,0,0,0]; current=0;
  document.getElementById('result-screen').style.display='none';
  document.getElementById('intro-screen').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
(function(){
  const p=new URLSearchParams(location.search), r=p.get('r');
  if(r!==null && RESULTS[parseInt(r)]){
    scores[parseInt(r)]=1;
    document.getElementById('intro-screen').style.display='none';
    showResult(true);
  }
})();
